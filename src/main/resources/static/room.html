<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>ROCKY WAITING ROOM</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/galmuri@latest/dist/galmuri.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        /* ==========================================
           Rocky Build Server - STRICT Pixel Art UI / room
           ========================================== */
        :root {
            --px-bg: #212529;
            --px-surface: #2C3E50;
            --px-surface-light: #34495E;
            --px-border: #000000;
            --px-text: #F7F7F7;
            --px-text-muted: #B2BEC3;
            --px-primary: #209CEE;
            --px-success: #92CC41;
            --px-warning: #F7D51D;
            --px-danger: #E76E55;
            --px-shadow-hard: 4px 4px 0px #000;
            --px-inset-light: inset -3px -3px 0px rgba(0,0,0,0.4);
            --px-inset-pressed: inset 3px 3px 0px rgba(0,0,0,0.4);
            --font-pixel: 'NeoDunggeunmo', 'Galmuri9', 'Press Start 2P', monospace;
        }

        * { box-sizing: border-box; image-rendering: pixelated; border-radius: 0 !important; }
        ::selection { background: var(--px-primary); color: var(--px-text); }
        html, body { margin:0; padding:0; background: var(--px-bg); font-family: var(--font-pixel); color: var(--px-text); line-height:1.4; height:100vh; overflow:hidden; font-size: 20px; }
        body { background-image: linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px); background-size: 16px 16px; }
        body::after { content:""; position:fixed; inset:0; background: repeating-linear-gradient(0deg, rgba(0,0,0,0.08) 0px, rgba(0,0,0,0.08) 1px, transparent 1px, transparent 2px); pointer-events:none; z-index:9999; }

        .pixel-card { background: var(--px-surface); border:4px solid var(--px-border); box-shadow: var(--px-shadow-hard); display:flex; flex-direction:column; overflow:hidden; }

        .pixel-btn { display:inline-flex; align-items:center; justify-content:center; font-family:var(--font-pixel); font-size:20px; color:#fff; border:4px solid var(--px-border); outline:none; cursor:pointer; padding:8px 14px; position:relative; user-select:none; box-shadow: var(--px-shadow-hard); transition: transform 0.06s, box-shadow 0.06s; text-decoration:none; }
        .pixel-btn:active { transform: translate(4px, 4px); box-shadow: 0px 0px 0px #000; }
        .pixel-btn:hover  { transform: translate(2px, 2px); box-shadow: 2px 2px 0px #000; }
        .pixel-btn-primary { background: var(--px-primary); text-shadow: 2px 2px 0 rgba(0,0,0,0.4); }
        .pixel-btn-primary:hover { background: #4DAEF4; }
        .pixel-btn-success { background: var(--px-success); color: #000; text-shadow: none; }
        .pixel-btn-success:hover { background: #B0E05D; }
        .pixel-btn-secondary { background: #636e72; text-shadow: 2px 2px 0 rgba(0,0,0,0.3); }
        .pixel-btn-secondary:hover { background: #7f8c8d; }
        .pixel-btn-danger { background: var(--px-danger); }
        .pixel-btn-danger:hover { background: #EE8C78; }

            .pixel-select { font-family:var(--font-pixel); font-size:20px; background:#1a1e21; color:var(--px-text); border:3px solid var(--px-border); outline:none; padding:6px 8px; width:100%; box-shadow: var(--px-inset-light); }
        .pixel-select:focus { border-color: var(--px-primary); outline: 2px dashed var(--px-warning); outline-offset: 2px; }

        .pixel-text-primary { color: var(--px-primary); text-shadow: 3px 3px 0 #000, -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000; }
        .pixel-text-success { color: var(--px-success); text-shadow: 2px 2px 0 #000; }
        .pixel-text-warning { color: var(--px-warning); text-shadow: 2px 2px 0 #000; }
        .pixel-text-danger { color: var(--px-danger); text-shadow: 2px 2px 0 #000; }
        .pixel-text-muted { color: var(--px-text-muted); }

        .page-container { display:flex; flex-direction:column; height:100vh; max-width:1280px; margin:0 auto; padding:12px 18px 8px; gap:8px; position:relative; z-index:10; overflow:hidden; }

        /* Left panel header */
        .room-header { padding:8px 12px; background: #1a1e21; border-bottom:4px solid var(--px-border); display:flex; justify-content:space-between; align-items:center; }
        .room-title { font-size:20px; color: var(--px-primary); text-shadow: 2px 2px 0 #000; margin:0; }
        .room-info-badge { font-size:16px; background: #1a1e21; border:2px solid var(--px-border); padding:2px 8px; color: #999; }

        /* Player grid */
        .player-grid { display:grid; grid-template-columns: repeat(4, 1fr); gap:6px; padding:6px; min-height:0; }
        .player-slot { background: var(--px-surface-light); border:4px solid var(--px-border); display:flex; flex-direction:column; align-items:center; justify-content:flex-start; gap:6px; padding:8px 8px; position:relative; transition:0.08s; text-align:center; min-height: 146px; box-shadow: var(--px-shadow-hard); }
        .player-slot.occupied { border-color: var(--px-success); position: relative; }
        .player-slot.occupied.host { border-color: var(--px-warning); }
        .player-slot.empty { border-style:dashed; border-color:#555; opacity:0.5; }
        .slot-kick-btn { position: absolute; top: 4px; right: 4px; width: 24px; height: 24px; background: rgba(231,110,85,0.85); border: 2px solid var(--px-border); color: #fff; font-family: var(--font-pixel); font-size: 14px; cursor: pointer; z-index: 5; display: flex; align-items: center; justify-content: center; box-shadow: var(--px-shadow-hard); transition: transform 0.06s, background 0.06s; }
        .slot-kick-btn:hover { background: var(--px-danger); transform: translate(1px, 1px); box-shadow: 1px 1px 0px #000; }
        .slot-avatar { font-size:2.8rem; line-height:1; display:flex; align-items:center; justify-content:center; height:3.8rem; flex-shrink:0; }
        .slot-name { font-size:16px; color:#ddd; width:100%; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; padding:0 2px; min-height:18px; }
        .slot-status { font-size:16px; padding:2px 8px; border:3px solid; width:auto; min-width:78px; text-align:center; }
        .status-host { color:var(--px-warning); border-color:var(--px-warning); background:rgba(247,213,29,0.15); }
        .status-ready { color:var(--px-success); border-color:var(--px-success); background:rgba(146,204,65,0.15); }
        .status-waiting { color:#888; border-color:#555; }
        .status-empty { font-size:3.2rem; color:#555; }

        .slot-host-badge { font-size:14px; color:var(--px-warning); border:2px solid var(--px-warning); background:rgba(247,213,29,0.15); padding:1px 8px; text-align:center; min-width:56px; }
        .slot-host-badge.hidden { visibility:hidden; }
        .slot-button-area { min-height:24px; display:flex; justify-content:center; align-items:center; }

        /* Chat */
        .chat-container { border:4px solid var(--px-border); border-bottom:none; display:flex; flex-direction:column; height:132px; flex-shrink:0; overflow:hidden; background: #1a1e21; min-height:0; }
        .chat-messages { flex:1; padding:6px; overflow-y:scroll; overflow-x:hidden; scrollbar-gutter: stable; overscroll-behavior: contain; display:flex; flex-direction:column; gap:3px; font-size:16px; min-height:0; }
        .chat-msg { line-height:1.5; word-break:break-all; }
        .msg-sys { color:var(--px-warning); font-size:16px; text-align:center; margin:2px 0; }
        .msg-user { color:var(--px-success); }
        .msg-text { color:#ccc; }
        .chat-input-wrapper { display:flex; border:4px solid var(--px-border); background:#1a1e21; flex-shrink:0; height:40px; }
        .chat-input { flex:1; background:transparent; border:none; color:#fff; padding:4px 10px; font-family:var(--font-pixel); font-size:16px; outline:none; }
        .chat-btn { background:#1a1e21; color:var(--px-primary); border:none; border-left:4px solid var(--px-border); padding:0 12px; font-family:var(--font-pixel); font-size:16px; cursor:pointer; }
        .chat-mode-btn { background: var(--px-surface-light); border:none; border-right:4px solid var(--px-border); color:#fff; padding:0 10px; font-family:var(--font-pixel); font-size:16px; cursor:pointer; appearance:none; text-align:center; }

        /* Right panel */
        .section-title { font-size:18px; color:var(--px-primary); text-shadow:2px 2px 0 #000; margin-bottom:6px; letter-spacing:1px; }
        .panel-section { padding:8px 10px; border-bottom:2px dashed #475569; }
        .panel-section:last-child { border-bottom:none; }

        .avatar-select-grid { display:grid; grid-template-columns: repeat(4, 1fr); gap:6px; }
        .avatar-btn { background: var(--px-surface-light); border:3px solid var(--px-border); padding:6px 0; text-align:center; cursor:pointer; font-size:1.8rem; transition:0.08s; color:#ccc; box-shadow: var(--px-shadow-hard); }
        .avatar-btn:hover { border-color:#fff; background:#3d5a80; transform: translate(2px,2px); box-shadow: 2px 2px 0px rgba(0,0,0,0.6); }
        .avatar-btn.selected { border-color:var(--px-primary); background:rgba(32,156,238,0.2); }

        .setting-row { display:flex; justify-content:space-between; align-items:center; margin-bottom:6px; }
        .setting-label { font-size:16px; color:#bbb; }
        .setting-val { font-size:16px; color:var(--px-success); text-shadow:1px 1px 0 #000; }

        /* Action area */
        .btn-ready {
            width:100%; padding:10px 0; font-size:18px; font-family:var(--font-pixel);
            background: var(--px-primary); border:4px solid var(--px-border); color:#fff;
            box-shadow: var(--px-shadow-hard); cursor:pointer; text-shadow:2px 2px 0 rgba(0,0,0,0.4);
            transition:0.06s; position:relative; top:0; display:block; margin-bottom:6px; letter-spacing:1px;
        }
        .btn-ready:hover { background:#4DAEF4; }
        .btn-ready:active { top:4px; box-shadow:0 0 0 rgba(0,0,0,0.6); }
        .btn-ready.is-ready { background: var(--px-success); color:#000; text-shadow:none; }
        .btn-ready.is-ready:hover { background:#B0E05D; }
        .btn-ready:disabled { opacity:0.5; cursor:not-allowed; }

        .auto-ready-toggle { display:flex; align-items:center; justify-content:center; gap:8px; font-size:14px; color:#999; cursor:pointer; }
        .auto-ready-toggle input { width:18px; height:18px; accent-color: var(--px-primary); cursor:pointer; }

        .problem-modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.92); z-index:3000; display:flex; align-items:center; justify-content:center; }
        .problem-modal-box { background: var(--px-surface); border:4px solid var(--px-primary); box-shadow: 0 0 0 4px #000, 0 0 30px rgba(32,156,238,0.5); padding: 40px 60px; text-align:center; animation: gameOverPop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        .modal-content { background: var(--px-surface); border:4px solid var(--px-border); box-shadow: 4px 4px 0px #000; padding:20px; max-width:92%; text-align:left; }
        .problem-modal-text { font-family:var(--font-pixel); font-size:28px; color:var(--px-primary); text-shadow:3px 3px 0 #000, -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000; margin-bottom:16px; word-break:keep-all; line-height:1.6; }
        .problem-modal-sub { font-family:var(--font-pixel); font-size:18px; color:#999; letter-spacing:2px; animation: blink 1s step-end infinite; }
        @keyframes gameOverPop {
            0% { transform: scale(0.3); opacity: 0; }
            50% { transform: scale(1.1); opacity: 1; }
            100% { transform: scale(1); opacity: 1; }
        }
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }
        .bottom-nav { position:relative; height:34px; background:#1a1e21; border-top:4px solid var(--px-border); z-index:100; display:flex; align-items:center; padding:0 8px; gap:8px; flex-shrink:0; }
        .nav-btn { background:transparent; border:3px solid #555; color:#bbb; padding:2px 10px; font-family:var(--font-pixel); font-size:14px; cursor:pointer; transition:0.1s; }
        .nav-btn:hover { background:#3d5a80; color:#fff; border-color:var(--px-primary); }
        .nav-btn.exit { border-color:#7a2e20; color:#f88; }
        .nav-btn.exit:hover { background:#5a1e10; border-color:var(--px-danger); color:#fff; }

        /* Online Users */
        .online-user-card { background: var(--px-surface); border:4px solid var(--px-border); box-shadow: var(--px-shadow-hard); padding:8px; display:flex; flex-direction:column; gap:4px; flex-grow:1; min-height:0; }
        .online-user-header { font-size:20px; color:var(--px-primary); text-shadow:2px 2px 0 #000; margin-bottom:2px; text-align:center; }
        .online-user-row { display:flex; align-items:center; gap:8px; padding:4px 6px; border-bottom:2px dashed #475569; }
        .online-user-row:last-child { border-bottom:none; }
        .online-user-avatar { font-size:2.2rem; width:48px; text-align:center; }
        .online-user-name { font-size:20px; color:#fff; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
        .online-indicator { font-size:20px; color:var(--px-success); margin-left:auto; }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 14px; }
        ::-webkit-scrollbar-track { background: var(--px-surface); border-left: 2px solid #000; }
        ::-webkit-scrollbar-thumb { background: var(--px-primary); border: 2px solid #000; }
        ::-webkit-scrollbar-thumb:hover { background: var(--px-warning); }

        /* RESPONSIVE */
        @media (max-width: 991px) {
            .player-grid { grid-template-columns: repeat(2, 1fr); }
            .page-container { padding:10px 14px 6px; }
            .btn-ready { padding:8px 0; font-size:16px; }
            .chat-container { height:118px; }
            .chat-input-wrapper { height:36px; }
            .chat-input, .chat-btn, .chat-mode-btn { font-size:14px; }
        }
        @media (max-width: 768px) {
            .player-grid { grid-template-columns: repeat(2, 1fr); gap:6px; padding:6px; }
            .room-header { flex-direction:column; gap:3px; padding:6px 8px; }
            .room-title { font-size:18px; }
            .panel-section { padding:6px 8px; }
            .avatar-select-grid { grid-template-columns: repeat(3, 1fr) !important; }
            .btn-ready { padding:7px 0; font-size:15px; }
            .page-container { padding:8px 12px 6px; }
            .chat-container { height:104px; }
            .chat-input-wrapper { height:34px; }
            .chat-input, .chat-btn, .chat-mode-btn { font-size:13px; }
        }
        @media (max-width: 576px) {
            .player-grid { grid-template-columns: 1fr 1fr; gap:6px; padding:6px; }
            .slot-avatar { font-size:2.2rem; }
            .slot-name { font-size:16px; }
            .slot-status { font-size:16px; padding:2px 6px; }
            .panel-section { padding:6px; }
            .section-title { font-size:18px; }
            .setting-row { flex-direction:column; align-items:flex-start; gap:3px; }
            .avatar-select-grid { grid-template-columns: repeat(2, 1fr) !important; }
            .chat-input { font-size:16px; padding:8px; }
            .chat-btn { padding:0 12px; font-size:16px; }
            .chat-container { height:120px; }
            .chat-input-wrapper { height:40px; }
        }
    </style>
</head>
<body>
<div id="root" class="w-100 h-100"></div>

<script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="/js/problems.js"></script>

<script type="text/babel">
    const { useState, useEffect, useRef } = React;

    function RoomApp() {
        const languages = [
            { id: 'java', icon: '☕', label: 'Java' },
            { id: 'python', icon: '🐍', label: 'Python' },
            { id: 'cpp', icon: '⚡', label: 'C++' },
        ];
        const characters = [
            { id: 'char1', icon: '🤺', label: '검사' },
            { id: 'char2', icon: '🧙', label: '마법사' },
            { id: 'char3', icon: '🥷', label: '닌자' },
            { id: 'char4', icon: '🤖', label: '로봇' },
        ];
        const safeProblems = typeof problems !== 'undefined' ? problems : { '쉬움': [], '보통': [], '어려움': [] };
        const problemPoolByDiff = {
            '쉬움': safeProblems['쉬움'] || [],
            '보통': safeProblems['보통'] || [],
            '어려움': safeProblems['어려움'] || []
        };
        const mapProblem = (p) => ({
            id: p.id,
            type: p.type,
            title: p.title,
            partialCode: p.partialCode,
            answer: p.answer,
            explanation: p.explanation
        });
        const diffToKorean = { 'EASY': '쉬움', 'NORMAL': '보통', 'HARD': '어려움', 'EXTREME': '어려움' };

        const params = new URLSearchParams(window.location.search);
        const roomId = params.get('id') || '';
        const roomTitleFromUrl = params.get('title') || '싱글 데스매치';
        const roomPwd = params.get('pwd') || '';
        const isPrivate = roomPwd.length > 0;
        const roomMode = params.get('mode') || '1/1';

        const langMap = { 'JAVA': 'java', 'PYTHON': 'python', 'C++': 'cpp' };
        const diffMap = { '쉬움': 'EASY', '보통': 'NORMAL', '어려움': 'HARD' };
        const urlLang = params.get('lang') || 'JAVA';
        const urlDiff = params.get('diff') || '보통';
        const urlTimeRaw = params.get('time') || '45분';
        const urlCount = params.get('count') || '5';
        const urlMaxPlayers = params.get('maxPlayers') || '8';
        const parsedMaxPlayers = Math.max(2, Math.min(8, parseInt(urlMaxPlayers) || 8));

        const initialLang = langMap[urlLang] || 'java';
        const initialDiff = diffMap[urlDiff] || 'NORMAL';
        const initialTime = urlTimeRaw;
        const initialCount = (parseInt(urlCount) >= 3 && parseInt(urlCount) <= 10) ? urlCount : '5';

        const [myLanguage, setMyLanguage] = useState(initialLang);
        const [myCharacter, setMyCharacter] = useState('char1');
        const [isReady, setIsReady] = useState(false);
        const [autoReady, setAutoReady] = useState(false);
        const [settings, setSettings] = useState({ time: initialTime, diff: initialDiff, theme: 'ALGORITHM: DP', count: initialCount, maxPlayers: parsedMaxPlayers });
        const [showProblemModal, setShowProblemModal] = useState(false);
        const [selectedProblem, setSelectedProblem] = useState('');
        const [showProfileModal, setShowProfileModal] = useState(false);
        const [profilePlayer, setProfilePlayer] = useState(null);
        const [profilePlayerIndex, setProfilePlayerIndex] = useState(null);
        const [showKickModal, setShowKickModal] = useState(false);
        const [kickTarget, setKickTarget] = useState(null);
        const [kickedCount, setKickedCount] = useState(() => {
            try { return parseInt(localStorage.getItem('room_kicked_' + roomId) || '0', 10); }
            catch { return 0; }
        });

        const demoBotPoolForRoom = [
            { name: '알고리즘노인', language: '🐍', character: '🧙' },
            { name: 'DP마스터', language: '☕', character: '🤖' },
            { name: '그리디왕', language: '🐍', character: '🦊' },
            { name: '자료구조봇', language: '☕', character: '🤖' },
            { name: '이분탐색요정', language: '🐍', character: '🧚' },
            { name: '큐러버', language: '☕', character: '🐼' },
            { name: '백트래커', language: '🐍', character: '🐉' },
            { name: '시뮬레이터', language: '☕', character: '🐱' }
        ];
        const initialPlayers = (() => {
            const totalSlots = parsedMaxPlayers;
            const base = [
                { id: 1, name: 'rocky_user', isHost: true, isReady: false, language: '☕', character: '🤺', status: 'HOST' }
            ];
            const botCount = roomMode === '1/1' ? 1 : Math.max(1, totalSlots - 1);
            const kicked = (() => { try { return parseInt(localStorage.getItem('room_kicked_' + roomId) || '0', 10); } catch { return 0; } })();
            const activeBotCount = Math.max(0, botCount - kicked);
            for (let i = 0; i < activeBotCount; i++) {
                const bot = demoBotPoolForRoom[i % demoBotPoolForRoom.length];
                base.push({
                    id: i + 2,
                    name: bot.name,
                    isHost: false,
                    isReady: true,
                    language: bot.language,
                    character: bot.character,
                    status: 'READY'
                });
            }
            while (base.length < 8) {
                base.push(null);
            }
            return base;
        })();
        const [players, setPlayers] = useState(initialPlayers);

        const [chatMsg, setChatMsg] = useState('');
        const [chatMode, setChatMode] = useState('ALL');
        const initialMessages = (() => {
            const msgs = [
                { type: 'sys', text: `>> ${roomMode === '1/1' ? '1:1 진검승부' : `1/${parsedMaxPlayers} 배틀`} 방이 생성되었습니다.` },
                { type: 'sys', text: '>> [rocky_user] 님이 입장하셨습니다.' }
            ];
            initialPlayers.forEach((p) => {
                if (p && p.id !== 1) {
                    msgs.push({ type: 'sys', text: `>> [${p.name}] 님이 입장하셨습니다.` });
                }
            });
            return msgs;
        })();
        const [messages, setMessages] = useState(initialMessages);
        const chatEndRef = useRef(null);
        useEffect(() => { if(chatEndRef.current) chatEndRef.current.scrollIntoView({ behavior: 'smooth' }); }, [messages]);

        const handleSendChat = () => {
            if (!chatMsg.trim()) return;
            setMessages([...messages, { type: 'user', name: 'rocky_user', text: chatMsg }]);
            setChatMsg('');
        };

        const handleMyReadyToggle = () => {
            if (players[0].isHost) {
                const newPlayers = [...players];
                newPlayers[0].isReady = !newPlayers[0].isReady;
                newPlayers[0].status = newPlayers[0].isReady ? 'READY' : 'WAITING';
                setPlayers(newPlayers);
            } else {
                setIsReady(!isReady);
            }
        };

        const handleStartGame = () => {
            const me = players[0];
            if (!me || !me.isHost) return;

            const diffKor = diffToKorean[String(settings.diff || '').toUpperCase()] || '보통';
            const pool = problemPoolByDiff[diffKor] || [];
            const count = Math.max(1, Math.min(10, parseInt(settings.count, 10) || 5));
            const selectedProblems = [];
            const poolCopy = [...pool];

            for (let i = 0; i < count; i += 1) {
                if (poolCopy.length === 0) {
                    poolCopy.push(...pool);
                }
                if (poolCopy.length === 0) break;
                const idx = Math.floor(Math.random() * poolCopy.length);
                selectedProblems.push(mapProblem(poolCopy.splice(idx, 1)[0]));
            }

            try {
                const sessionKey = roomId ? `battle-${roomId}` : 'battle-solo';
                [
                    'battleDraft_' + sessionKey,
                    'battleDraftCode_' + sessionKey,
                    'battleDraftMeta_' + sessionKey,
                    'battleSubmittedProblems_' + sessionKey,
                    'battleDemoState_' + sessionKey,
                    'battleSubmission',
                    'battleProblemData',
                    'battleProblemTitle',
                    'myBattleCode',
                    'opponentBattleCode',
                    'roomUsers',
                    'battleProblems',
                    'battleSettings'
                ].forEach((key) => localStorage.removeItem(key));

                localStorage.setItem('battleProblems', JSON.stringify(selectedProblems));
                localStorage.setItem('battleSettings', JSON.stringify({
                    roomId,
                    lang: myLanguage,
                    diff: settings.diff,
                    count: String(selectedProblems.length || count),
                    maxPlayers: String(settings.maxPlayers || parsedMaxPlayers),
                    roomMode
                }));

                const storedRooms = localStorage.getItem('dynamicRooms');
                if (storedRooms) {
                    const dynamicRooms = JSON.parse(storedRooms);
                    const updatedRooms = Array.isArray(dynamicRooms)
                        ? dynamicRooms.map(r => String(r.id) === String(roomId) ? { ...r, status: 'STARTED' } : r)
                        : dynamicRooms;
                    localStorage.setItem('dynamicRooms', JSON.stringify(updatedRooms));
                }
            } catch (e) {
                console.error('이전 전투 상태 정리 실패:', e);
            }
        };

        const handleLeaveToLobby = () => {
            try {
                const storedRooms = localStorage.getItem('dynamicRooms');
                const dynamicRooms = storedRooms ? JSON.parse(storedRooms) : [];
                if (Array.isArray(dynamicRooms)) {
                    const updatedRooms = dynamicRooms.filter(r => String(r.id) !== String(roomId));
                    localStorage.setItem('dynamicRooms', JSON.stringify(updatedRooms));
                }
            } catch (e) {
                // 삭제 실패해도 로비 이동은 유지
            }
            try { localStorage.removeItem('room_kicked_' + roomId); } catch (e) {}
            try {
                const sessionKey = roomId ? `battle-${roomId}` : 'battle-solo';
                ['battleDraft_' + sessionKey, 'battleDraftCode_' + sessionKey, 'battleDraftMeta_' + sessionKey, 'battleSubmittedProblems_' + sessionKey, 'battleSubmission', 'battleProblemData', 'battleProblemTitle', 'myBattleCode', 'opponentBattleCode', 'roomUsers', 'battleProblems', 'battleSettings'].forEach((key) => localStorage.removeItem(key));
            } catch (e) {
                console.error('세션 정리 실패:', e);
            }
            window.location.href = 'lobby.html';
        };

        const toggleUserReady = (idx) => {
            const newPlayers = [...players];
            if(newPlayers[idx] && !newPlayers[idx].isHost) {
                newPlayers[idx].isReady = !newPlayers[idx].isReady;
                newPlayers[idx].status = newPlayers[idx].isReady ? 'READY' : 'WAITING';
                setPlayers(newPlayers);
            }
        };
        const handleKickPlayer = () => {
            if (!kickTarget || !players[kickTarget.index]) return;
            const newPlayers = [...players];
            const kickedName = newPlayers[kickTarget.index].name;
            newPlayers[kickTarget.index] = null;
            setPlayers(newPlayers);
            const newKicked = kickedCount + 1;
            setKickedCount(newKicked);
            localStorage.setItem('room_kicked_' + roomId, String(newKicked));
            setMessages(prev => [...prev, { type: 'sys', text: `>> [${kickedName}] 님이 강퇴되었습니다.` }]);
            try {
                const stored = localStorage.getItem('dynamicRooms');
                if (stored) {
                    const rooms = JSON.parse(stored);
                    const updated = rooms.map(r => {
                        if (String(r.id) === String(roomId)) {
                            const parts = String(r.players).split('/');
                            const max = parseInt(parts[1] || '8', 10);
                            const current = Math.max(1, (parseInt(parts[0], 10) || 1) - 1);
                            return { ...r, players: `${current}/${max}` };
                        }
                        return r;
                    });
                    localStorage.setItem('dynamicRooms', JSON.stringify(updated));
                }
            } catch (e) { console.error('방 인원 업데이트 실패:', e); }
            setShowKickModal(false);
            setKickTarget(null);
        };
        const updateSetting = (key, value) => { setSettings({...settings, [key]: value}); };

        const myIsReady = players[0].isHost ? players[0].isReady : isReady;

        return (
            <>
                <div className="page-container">
                    <div className="row g-3" style={{flex:1, minHeight:0}}>
                        {/* Left Column */}
                        <div className="col-lg-9 d-flex flex-column">
                            <div className="pixel-card" style={{height:'100%'}}>
                                <div className="room-header">
                                    <h3 className="room-title">#001 - {roomTitleFromUrl}</h3>
                            <div className="room-info-badge">
                                {isPrivate ? `PRIVATE 🔒 | ` : 'PUBLIC | '}
                                {roomMode} | {players.filter(p => p !== null).length}/{parsedMaxPlayers} 명
                            </div>
                                </div>
                                <div className="player-grid" style={{flex:1, overflow:'auto'}}>
                                    {players.map((p, idx) => (
                                        <div key={idx} className={`player-slot ${p ? 'occupied' : 'empty'} ${p?.isHost ? 'host' : ''}`} onClick={p ? () => { setProfilePlayer(p); setProfilePlayerIndex(idx); setShowProfileModal(true); } : undefined} style={p ? {cursor:'pointer'} : {}}>
                                            {/* Avatar */}
                                            <div className="slot-avatar" style={{color: p?.isHost ? 'var(--px-warning)' : 'var(--px-primary)'}}>
                                                {p ? (idx === 0 ? characters.find(c=>c.id===myCharacter)?.icon : p.character) : <span className="status-empty">X</span>}
                                            </div>

                                            {/* Host badge (always rendered to keep layout) */}
                                            <div className={`slot-host-badge ${p?.isHost ? '' : 'hidden'}`}>
                                                HOST
                                            </div>

                                            {/* Name */}
                                            <div className="slot-name" style={{color: p ? '#ddd' : '#555'}}>
                                                {p ? (
                                                    <>
                                                        <span style={{marginRight:'4px'}}>{idx === 0 ? languages.find(l=>l.id===myLanguage)?.icon : p.language}</span>
                                                        {p.name}
                                                    </>
                                                ) : 'Empty'}
                                            </div>

                                            {/* Status (READY / WAITING) */}
                                            <div
                                                className={`slot-status ${p && !p.isHost ? (p.isReady ? 'status-ready' : 'status-waiting') : ''}`}
                                                style={!p || p.isHost ? { visibility: 'hidden' } : {}}
                                            >
                                                {p && !p.isHost ? (p.isReady ? 'READY' : 'WAITING') : ''}
                                            </div>

                                            {/* Button area */}
                                            <div className="slot-button-area">
                                                <div style={{width:'1px'}}></div>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                                <div className="chat-container">
                                    <div className="chat-messages">
                                        {messages.map((m, i) => (
                                            <div key={i} className="chat-msg">
                                                {m.type === 'sys' ? (
                                                    <div className="msg-sys">{m.text}</div>
                                                ) : (
                                                    <div><span className="msg-user">[{m.name}]</span> <span className="msg-text">{m.text}</span></div>
                                                )}
                                            </div>
                                        ))}
                                        <div ref={chatEndRef} />
                                    </div>
                                </div>
                                <div className="chat-input-wrapper">
                                    <select className="chat-mode-btn" value={chatMode} onChange={e => setChatMode(e.target.value)}>
                                        <option value="ALL">모두에게</option>
                                        <option value="FRIEND">친구에게</option>
                                    </select>
                                    <input type="text" className="chat-input" placeholder="Enter Chat (Enter)"
                                        value={chatMsg} onChange={e => setChatMsg(e.target.value)}
                                        onKeyDown={e => e.key === 'Enter' && handleSendChat()}
                                    />
                                    <button className="chat-btn" onClick={handleSendChat}>SEND</button>
                                </div>

                                <div className="bottom-nav">
                                    <button className="nav-btn exit ms-auto" onClick={handleLeaveToLobby}>◀ 로비로</button>
                                </div>
                            </div>
                        </div>

                        {/* Right Column */}
                        <div className="col-lg-3 d-flex flex-column">
                            <div className="pixel-card" style={{height:'100%', overflow:'hidden'}}>
                                <div className="panel-section">
                                    <div className="section-title">CHARACTER SELECT</div>
                                    <div className="avatar-select-grid">
                                        {characters.map(c => (
                                            <div key={c.id} className={`avatar-btn ${myCharacter === c.id ? 'selected' : ''}`} onClick={() => setMyCharacter(c.id)}>
                                                {c.icon}
                                                <div style={{fontSize:'18px', marginTop:'4px'}}>{c.label}</div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                                <div className="panel-section">
                                    <div className="section-title">BATTLE SETTINGS</div>
                                    <div className="setting-row">
                                        <span className="setting-label">언어</span>
                                        <span className="setting-val">{languages.find(l=>l.id===myLanguage)?.icon} {languages.find(l=>l.id===myLanguage)?.label}</span>
                                    </div>
                                    <div className="setting-row">
                                        <span className="setting-label">난이도</span>
                                        <span className="setting-val">{settings.diff}</span>
                                    </div>
                                    <div className="setting-row">
                                        <span className="setting-label">문제 수</span>
                                        <span className="setting-val">{settings.count} 개</span>
                                    </div>
                                </div>
                                <div className="panel-section" style={{alignItems:'center'}}>
                                    <div className="section-title" style={{fontSize:'18px', textAlign:'center', marginBottom:'6px'}}>ONLINE USERS</div>
                                    <div className="online-user-card" style={{minHeight:'60px', maxHeight:'200px', overflowY:'auto'}}>
                                        {players.filter(p => p !== null).length === 0 ? (
                                            <div style={{textAlign:'center', color:'#666', fontSize:'16px', padding:'8px 0'}}>접속 중인 유저가 없습니다</div>
                                        ) : (
                                            players.map((p, idx) => (
                                                p && (
                                                    <div className="online-user-row" key={idx} onClick={() => { setProfilePlayer(p); setProfilePlayerIndex(idx); setShowProfileModal(true); }} style={{cursor:'pointer'}}>
                                                        <div className="online-user-avatar">{idx === 0 ? characters.find(c=>c.id===myCharacter)?.icon : p.character}</div>
                                                        <div className="online-user-name">{p.name || 'Unknown'}</div>
                                                        <div className="online-indicator">●</div>
                                                    </div>
                                                )
                                            ))
                                        )}
                                    </div>
                                </div>
                                <div className="panel-section" style={{alignItems:'center'}}>
                                    {players[0] && players[0].isHost ? (
                                        <a
                                            href={`battle.html?fresh=1&roomId=${encodeURIComponent(roomId || '')}&lang=${encodeURIComponent(myLanguage || 'java')}&mode=${encodeURIComponent(roomMode || '1/1')}&count=${encodeURIComponent(settings.count || '5')}&maxPlayers=${encodeURIComponent(settings.maxPlayers || parsedMaxPlayers)}`}
                                            className="btn-ready"
                                            onClick={handleStartGame}
                                            style={{width:'100%', background:'var(--px-success)', color:'#000', textShadow:'none', textDecoration:'none', display:'inline-flex', alignItems:'center', justifyContent:'center'}}
                                        >
                                            START
                                        </a>
                                    ) : (
                                        <>
                                            <div style={{display:'flex', gap:'8px', width:'100%'}}>
                                                <button className={`btn-ready ${myIsReady ? 'is-ready' : ''}`} style={{flex:1}} onClick={handleMyReadyToggle}>
                                                    {myIsReady ? 'CANCEL' : 'READY'}
                                                </button>
                                            </div>
                                            <label className="auto-ready-toggle">
                                                <input type="checkbox" checked={autoReady} onChange={e=>setAutoReady(e.target.checked)} />
                                                자동 준비 (Auto Ready)
                                            </label>
                                        </>
                                    )}
                                </div>
                            </div>
                        </div>
                    </div>

                </div>

                {/* Problem Modal */}
                {showProblemModal && (
                    <div className="problem-modal-overlay">
                        <div className="problem-modal-box">
                            <div className="problem-modal-text">{selectedProblem}</div>
                            <div className="problem-modal-sub">BATTLE PAGE로 이동 중입니다...</div>
                        </div>
                    </div>
                )}

                {showKickModal && kickTarget && (
                <div className="problem-modal-overlay" onClick={() => { setShowKickModal(false); setKickTarget(null); }}>
                    <div className="modal-content" style={{width:'360px'}} onClick={e => e.stopPropagation()}>
                        <h3 className="text-center pixel-text-danger" style={{marginBottom:'16px', fontSize:'22px'}}>⚠ 강제 퇴출</h3>
                        <div className="text-center mb-4" style={{fontSize:'18px', color:'#ddd'}}>
                            [{kickTarget.name}] 님을 강퇴하시겠습니까?
                        </div>
                        <div className="d-flex justify-content-center gap-3">
                            <button className="pixel-btn pixel-btn-primary" style={{minWidth:'100px', background:'var(--px-danger)'}} onClick={handleKickPlayer}>강퇴</button>
                            <button className="pixel-btn pixel-btn-secondary" style={{minWidth:'100px'}} onClick={() => { setShowKickModal(false); setKickTarget(null); }}>취소</button>
                        </div>
                    </div>
                </div>
            )}
                {showProfileModal && profilePlayer && (
                    <div className="problem-modal-overlay" onClick={() => setShowProfileModal(false)}>
                        <div className="modal-content" style={{width:'320px'}} onClick={e => e.stopPropagation()}>
                            <h3 className="text-center pixel-text-primary" style={{marginBottom:'16px', fontSize:'22px'}}>USER PROFILE</h3>
                            <div className="d-flex flex-column align-items-center gap-3 mb-4">
                                <div style={{fontSize:'4rem', lineHeight:1}}>
                                    {profilePlayer.isHost ? characters.find(c=>c.id===myCharacter)?.icon : profilePlayer.character}
                                </div>
                                <div style={{fontSize:'22px', color:'#eee'}}>{profilePlayer.name}</div>
                                {profilePlayer.isHost && (
                                    <div className="slot-host-badge" style={{visibility:'visible', fontSize:'18px'}}>HOST</div>
                                )}
                            </div>
                            <div className="text-center">
                                {players[0].isHost && !profilePlayer.isHost && roomMode !== '1/1' && (
                                    <button className="pixel-btn pixel-btn-primary" style={{minWidth:'120px', background:'var(--px-danger)', marginRight:'8px'}} onClick={() => {
                                        setShowProfileModal(false);
                                        setKickTarget({ index: profilePlayerIndex, name: profilePlayer.name });
                                        setShowKickModal(true);
                                    }}>강퇴</button>
                                )}
                                <button className="pixel-btn pixel-btn-secondary" style={{minWidth:'120px'}} onClick={() => setShowProfileModal(false)}>닫기</button>
                            </div>
                        </div>
                    </div>
                )}
            </>
        );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<RoomApp />);
</script>
</body>
</html>
