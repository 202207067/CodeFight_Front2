            const bot = battleBots.find((b) => b.id === targetBotId);
            if (!bot) return;

            if (itemType === 'symbol') {
                if (!selectedSymbol) return;
                const originalAns = bot.blankAnswersByProblem?.[currentIndex]?.[selectedBlank] || '';
                let modifiedValue = originalAns;
                if (symbolAction === 'add') {
                    modifiedValue = originalAns + selectedSymbol;
                } else if (symbolAction === 'delete') {
                    const idx = originalAns.indexOf(selectedSymbol);
                    if (idx >= 0) {
                        modifiedValue = originalAns.slice(0, idx) + originalAns.slice(idx + 1);
                    }
                }
                setOpponentEffects((prev) => ({
                    ...prev,
                    [targetBotId]: {
                        ...(prev[targetBotId] || {}),
                        [currentIndex]: {
                            ...(prev[targetBotId]?.[currentIndex] || {}),
                            blankEffects: {
                                ...(prev[targetBotId]?.[currentIndex]?.blankEffects || {}),
                                [selectedBlank]: { type: 'symbol', modifiedValue, expiresAt: Date.now() + 10000 }
                            }
                        }
                    }
                }));
                setItemInventory((prev) => ({ ...prev, symbol: prev.symbol - 1 }));
            }

            setShowSubItemModal(false);
            setAttackState({
                active: true,
                phase: 'applied',
                targetBotId: targetBotId,
                itemType: 'symbol',
                revealTimer: 10,
                selectedLine: null
            });
            startRevealTimer();
            setSelectedSymbol('');
            setSymbolAction('add');
        };

        const getModifiedCode = (botId, problemIndex, originalCode) => {
            const effects = opponentEffects[botId]?.[problemIndex];
            if (!effects?.codeMods) return originalCode;
            const lines = originalCode.split('\n');
            Object.entries(effects.codeMods).forEach(([lineIdx, modifiedText]) => {
                const idx = parseInt(lineIdx, 10);
                if (idx >= 0 && idx < lines.length) {
                    lines[idx] = modifiedText;
                }
            });
            return lines.join('\n');
        };

        const handleCloseItemModal = () => {
            setShowItemModal(false);
            setShowSubItemModal(false);
            if (revealTimerRef.current) {
                clearInterval(revealTimerRef.current);
                revealTimerRef.current = null;
            }
            setAttackState({ active: false, phase: null, targetBotId: null, itemType: null, revealTimer: 0, selectedLine: null });
        };

        useEffect(() => {
            setExpandedOpponentId(null);
            setAttackState({ active: false, phase: null, targetBotId: null, itemType: null, revealTimer: 0, selectedLine: null });
            if (revealTimerRef.current) {
                clearInterval(revealTimerRef.current);
                revealTimerRef.current = null;
            }
            if (!demoIsVersusMany && battleBots.length === 1) {
                setExpandedOpponentId(battleBots[0].id);
            }
        }, [currentIndex]);

        useEffect(() => {
            const timer = setInterval(() => { setRemaining((prev) => (prev > 0 ? prev - 1 : 0)); }, 1000);
            return () => clearInterval(timer);
        }, []);

        useEffect(() => {
            if (battleFinished || problems.length === 0) return;
            if (advanceQueuedRef.current || showAdvanceModal) return;

            const activeBotStates = battleBots.map((bot) => ({
                ...bot,
                solved: (bot.solveScheduleByProblem?.[currentIndex] ?? 0) >= remaining
            }));
            const allBotsSolved = activeBotStates.length > 0 && activeBotStates.every((bot) => bot.solved);
            const timeUp = remaining <= 0;
            const shouldAdvance = timeUp || (allBotsSolved && currentProblemLocked);

            if (!shouldAdvance) return;

            if (currentIndex >= problems.length - 1) {
                setBattleFinished(true);
                setShowAdvanceModal(true);
                setShowGameOver(true);
                persistBattleSubmission(answers, currentIndex);
                return;
            }

            const reason = timeUp ? 'time' : 'all-clear';
            setAdvanceReason(reason);
            queueAdvanceProblem(reason);
        }, [remaining, currentIndex, problems.length, battleBots, currentProblemLocked, battleFinished, showAdvanceModal]);

        useEffect(() => {
            if (demoSpectating || showAdvanceModal || battleFinished) return;
            if (remaining <= 0) return;

            const interval = setInterval(() => {
                setBotRevealTick((tick) => tick + 1);
            }, 1000);

            return () => clearInterval(interval);
        }, [demoSpectating, showAdvanceModal, battleFinished, remaining]);

        useEffect(() => {
            if (!battleRoundState || battleRoundState.problemIndex !== currentIndex) return;
            if (battleRoundState.completed) return;

            const hasPendingBot = currentBotViews.some((bot) => remaining <= bot.currentSchedule && !bot.solvedProblems.includes(currentIndex));
            if (!hasPendingBot && currentProblemLocked) {
                setBattleRoundState((prev) => prev ? { ...prev, completed: true } : prev);
            }
        }, [remaining, currentIndex, battleRoundState, currentBotViews, currentProblemLocked]);

        const botSolveRecordedRef = useRef({});
        useEffect(() => {
            if (battleBots.length === 0) return;
            let changed = false;
            const nextSolves = { ...botSolves };
            battleBots.forEach((bot) => {
                const schedule = bot.solveScheduleByProblem?.[currentIndex] ?? Infinity;
                const key = `${bot.id}-${currentIndex}`;
                if (remaining <= schedule && !botSolveRecordedRef.current[key]) {
                    botSolveRecordedRef.current[key] = true;
                    const arr = Array.isArray(nextSolves[bot.id]) ? [...nextSolves[bot.id]] : [];
                    if (!arr.includes(currentIndex)) {
                        arr.push(currentIndex);
                        arr.sort((a, b) => a - b);
                        nextSolves[bot.id] = arr;
                        changed = true;
                    }
                }
            });
            if (changed) setBotSolves(nextSolves);
        }, [remaining, currentIndex, battleBots.length]);

        useEffect(() => {
            if (!initialSessionLoadedRef.current || showGameOver) return;
            if (remaining <= 0 || remaining % 5 !== 0) return;
            if (lastTimedPersistRemainingRef.current === remaining) return;
            lastTimedPersistRemainingRef.current = remaining;
            persistBattleSession(answers).catch(() => {});
        }, [remaining, showGameOver]);

        useEffect(() => {
            if (showGameOver) {
                persistBattleSession(answers).catch(() => {});
                localStorage.setItem('roomUsers', JSON.stringify(roomUsers));
                const t = setTimeout(() => { window.location.href = `result.html?roomId=${roomId}`; }, 3000);
                return () => clearTimeout(t);
            }
        }, [showGameOver]);

        useEffect(() => {
            const handleBeforeUnload = () => {
                persistBattleSession(answers).catch(() => {});
            };
            window.addEventListener('beforeunload', handleBeforeUnload);
            return () => window.removeEventListener('beforeunload', handleBeforeUnload);
        }, [answers, currentIndex, remaining, problems]);

        useEffect(() => {
            return () => {
                if (advanceTimerRef.current) clearTimeout(advanceTimerRef.current);
                if (saveModalTimerRef.current) clearTimeout(saveModalTimerRef.current);
                if (clearFlashTimerRef.current) clearTimeout(clearFlashTimerRef.current);
            };
        }, []);

        useEffect(() => {
            if (!itemInventoryInitialized.current) {
                itemInventoryInitialized.current = true;
                return;
            }
            localStorage.setItem('rocky_items', JSON.stringify(itemInventory));
        }, [itemInventory]);

        useEffect(() => {
            if (problems.length === 0 || answers.length === 0) return;

            try {
                const storedSubmitted = localStorage.getItem('battleSubmittedProblems_' + sessionId);
                if (storedSubmitted) {
                    const parsedSubmitted = JSON.parse(storedSubmitted);
                    if (Array.isArray(parsedSubmitted)) {
                        setSubmittedProblemIndices(parsedSubmitted.filter((value) => Number.isInteger(value)));
                    }
                }
            } catch {}

            if (initialSessionLoadedRef.current && initialSessionSaveQueuedRef.current) {
                initialSessionSaveQueuedRef.current = false;
                persistBattleSession(answers).catch(() => {});
            }

            const currentSnapshot = answers.join('||');
            if (!initialSessionLoadedRef.current) {
                initialSessionLoadedRef.current = true;
                setSessionSavedSnapshot(currentSnapshot);
                setIsEdited(false);
                setSaveStatus('saved');
                persistBattleSession(answers).catch(() => {});
                return;
            }

            const dirty = currentSnapshot !== sessionSavedSnapshot;
            setIsEdited(dirty);
            setSaveStatus(dirty ? 'unsaved' : 'saved');

            if (!dirty) return;

            if (saveDebounceRef.current) clearTimeout(saveDebounceRef.current);
            saveDebounceRef.current = setTimeout(() => {
                persistBattleSession(answers).catch(() => {});
            }, 800);

            return () => {
                if (saveDebounceRef.current) clearTimeout(saveDebounceRef.current);
            };
        }, [answers, sessionSavedSnapshot]);

        useEffect(() => {
            if (!initialSessionLoadedRef.current) return;
            persistBattleSession(answers).catch(() => {});
        }, [currentIndex]);

        const persistBattleSession = async (nextAnswers = answers, options = {}) => {
            const shouldCommit = options.commit === true;
            if (saveDebounceRef.current) {
                clearTimeout(saveDebounceRef.current);
                saveDebounceRef.current = null;
            }

            const snapshot = (nextAnswers || []).join('||');
            try {
                setSaveStatus('saving');
                localStorage.setItem('battleDraft_' + sessionId, JSON.stringify({
                    roomId,
                    sessionId,
                    lang: langKey,
                    currentIndex,
                    remaining,
                    answers: nextAnswers,
                    problems,
                    snapshot,
                    updatedAt: new Date().toISOString()
                }));
                localStorage.setItem('battleDraftCode_' + sessionId, JSON.stringify(nextAnswers));
                localStorage.setItem('battleDraftMeta_' + sessionId, JSON.stringify({
                    roomId,
                    sessionId,
                    lang: langKey,
                    currentIndex,
                    remaining,
                    updatedAt: new Date().toISOString()
                }));

                await fetch('/api/v1/build/session/save', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        sessionId,
                        userId: 'rocky_user',
                        language: langKey,
                        roomId,
                        status: 'BATTLE',
                        currentIndex: String(currentIndex),
                        remaining: String(remaining),
                        problems: problems.map((problem, index) => ({
                            title: problem?.title || '',
                            description: problem?.description || '',
                            input: problem?.input || '',
                            output: problem?.output || '',
                            code: nextAnswers[index] || ''
                        }))
                    })
                });

                if (shouldCommit) {
                    setSessionSavedSnapshot(snapshot);
                    setIsEdited(false);
                    setSaveStatus('saved');
                } else {
                    setSaveStatus(snapshot === sessionSavedSnapshot ? 'saved' : 'unsaved');
                }
            } catch (e) {
                console.error('세션 저장 실패:', e);
                setSaveStatus('unsaved');
            }
        };

        const restoreBattleSession = (baseProblems, baseAnswers) => {
            try {
                const draftKey = 'battleDraft_' + sessionId;
                const draftCodeKey = 'battleDraftCode_' + sessionId;
                const draftMetaKey = 'battleDraftMeta_' + sessionId;
                const storedDraft = localStorage.getItem(draftKey);
                if (!storedDraft) return false;

                const draft = JSON.parse(storedDraft);
                const storedCodes = localStorage.getItem(draftCodeKey);
                const parsedCodes = storedCodes ? JSON.parse(storedCodes) : draft.answers;
                const nextAnswers = Array.isArray(parsedCodes) ? parsedCodes : [];
                const nextProblems = Array.isArray(draft.problems) && draft.problems.length > 0 ? draft.problems : baseProblems;

                if (nextProblems.length > 0) setProblems(nextProblems);
                if (nextAnswers.length > 0) setAnswers(nextAnswers);
                else if (baseAnswers.length > 0) setAnswers(baseAnswers);

                const storedMeta = localStorage.getItem(draftMetaKey);
                let restoredRemaining = timeMin * 60;
                if (storedMeta) {
                    const meta = JSON.parse(storedMeta);
                    if (meta?.currentIndex !== undefined) {
                        setCurrentIndex(Math.min(Math.max(parseInt(meta.currentIndex, 10) || 0, 0), Math.max((nextProblems.length || baseProblems.length) - 1, 0)));
                    }
                    if (meta?.remaining !== undefined) {
                        restoredRemaining = Math.max(0, parseInt(meta.remaining, 10) || timeMin * 60);
                        setRemaining(restoredRemaining);
                    }
                }

                const nextSnapshot = (nextAnswers.length > 0 ? nextAnswers : baseAnswers).join('||');
                setSessionSavedSnapshot(nextSnapshot);
                setIsEdited(false);
                setSaveStatus('saved');
                initialSessionLoadedRef.current = true;
                initialSessionSaveQueuedRef.current = true;
                lastTimedPersistRemainingRef.current = restoredRemaining;
                return true;
            } catch (e) {
                console.error('세션 복원 실패:', e);
                return false;
            }
        };

        const markProblemSubmitted = (problemIndex) => {
            if (!Number.isInteger(problemIndex) || problemIndex < 0 || problemIndex >= totalProblems) return;

            setSubmittedProblemIndices((prev) => {
                const next = Array.from(new Set([...prev, problemIndex])).sort((a, b) => a - b);
                localStorage.setItem('battleSubmittedProblems_' + sessionId, JSON.stringify(next));
                return next;
            });
        };

        const requestProblemSwitch = (nextIndex) => {
            if (nextIndex === currentIndex) return;
            setChatExpanded(false);
            const isDirty = answers.join('||') !== sessionSavedSnapshot;
            if (isDirty) {
                setPendingProblemIndex(nextIndex);
                setIsProblemSwitchPromptOpen(true);
                return;
            }
            setCurrentIndex(nextIndex);
        };

        const confirmProblemSwitch = async () => {
            await persistBattleSession(answers, { commit: true });
            markProblemSubmitted(currentIndex);
            setChatExpanded(false);
            if (pendingProblemIndex !== null) {
                setCurrentIndex(pendingProblemIndex);
            }
            setPendingProblemIndex(null);
            setIsProblemSwitchPromptOpen(false);
        };

        const cancelProblemSwitch = () => {
            setPendingProblemIndex(null);
            setIsProblemSwitchPromptOpen(false);
        };

        const handleSubmit = () => {
            if (demoSpectating || spectatorLocked) return;
            lockAndSpectate();
        };

        const updateBlankAnswer = (problemIndex, blankIndex, value) => {
            setBlankAnswers(prev => {
                const next = prev.map(arr => [...arr]);
                if (!next[problemIndex]) next[problemIndex] = [];
                next[problemIndex][blankIndex] = value;
                return next;
            });
        };

        const handleCheck = () => {
            const currentAnswers = blankAnswers[currentIndex] || [];
            const problem = problems[currentIndex] || {};
            const partial = (typeof problem.partialCode === 'string' ? problem.partialCode : problem.partialCode?.[difficulty]) || '';
            const blankCount = countBlanks(partial);
            const allCorrect = problem.answer?.[difficulty]?.[langKey] || [];
            const correctAnswers = allCorrect.slice(0, blankCount);
            let allMatch = true;
            let wrongCount = 0;
            for (let i = 0; i < correctAnswers.length; i++) {
                const userAns = (currentAnswers[i] || '').trim();
                const correctAns = (correctAnswers[i] || '').trim();
                if (userAns.toLowerCase() !== correctAns.toLowerCase()) {
                    allMatch = false;
                    wrongCount++;
                }
            }
            const isCorrect = allMatch && currentAnswers.length >= correctAnswers.length && correctAnswers.length > 0;
            setCheckResults(prev => ({ ...prev, [currentIndex]: { correct: isCorrect, message: isCorrect ? '정답!' : `틀렸습니다. (${wrongCount}개 오답)` } }));
        };

        function renderPartialCode(code, answers, problemIndex, blankEffects) {
            const codeStr = typeof code === 'string' ? code : '';
            if (!codeStr) return null;
            const parts = codeStr.split('_____');
            const isBotView = problemIndex === -1;
            const isLocked = !isBotView && (demoSpectating || spectatorLocked);
            const safeAnswers = answers || [];
            const effects = blankEffects || {};
            const now = Date.now();
            return (
                <div style={{whiteSpace: 'pre-wrap'}}>
                    {parts.map((part, i) => {
                        const eff = effects[i];
                        const isGrenade = eff?.type === 'grenade' && now < eff.expiresAt;
                        const isSymbol = eff?.type === 'symbol' && now < eff.expiresAt;
                        return (
                            <span key={i} style={{whiteSpace: 'pre-wrap'}}>
                                {part}
                                {i < parts.length - 1 && (
                                    <input 
                                        className="blank-input" 
                                        value={isSymbol ? eff.modifiedValue : (safeAnswers[i] || '')} 
                                        onChange={isBotView || isLocked || isGrenade ? undefined : e => updateBlankAnswer(problemIndex, i, e.target.value)}
                                        readOnly={isBotView || isLocked || isGrenade}
                                        disabled={isBotView || isLocked || isGrenade}
                                        style={{
                                            width: '80px',
                                            display: 'inline-block',
                                            backgroundColor: isGrenade ? 'rgba(231,76,60,0.4)' : (isSymbol ? 'rgba(247,213,29,0.4)' : ''),
                                            textDecoration: isGrenade ? 'line-through' : 'none',
                                            color: isGrenade ? '#e74c3c' : (isSymbol ? '#f7d51d' : '')
                                        }}
                                    />
                                )}
                            </span>
                        );
                    })}
                </div>
            );
        }

        const updateCode = (newCode) => {
            if (demoSpectating || spectatorLocked) return;
            const nextAnswers = [...answers];
            nextAnswers[currentIndex] = newCode;
            setAnswers(nextAnswers);

            const dirty = nextAnswers.join('||') !== sessionSavedSnapshot;
            setIsEdited(dirty);
            setSaveStatus(dirty ? 'unsaved' : 'saved');
        };

        const handleBuild = async () => {
            if (demoSpectating || spectatorLocked) return;
            const codeToRun = answers[currentIndex];
            if (!codeToRun || !codeToRun.trim()) { setStatus("error"); setOutput("> ERROR: NO CODE TO BUILD"); return; }
            setStatus("running"); setOutput("> EXECUTING...\n");
            try {
                await persistBattleSession(answers).catch(() => {});
                const response = await fetch('/api/v1/build/run', {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ userId: 'rocky_user', language: langLabel, code: codeToRun })
                });
                const result = await response.json();
                if (result.success) { setStatus('success'); setOutput(`> SUCCESS [EXIT 0]\n\n${result.output || ''}`); }
                else { setStatus('error'); setOutput(`> FAILED [EXIT 1]\n\n${result.error || 'ERROR'}`); }
            } catch (error) { setStatus('error'); setOutput(`> NETWORK ERROR\n${error.message}`); }
        };

        const deleteRoomAndNavigate = (targetUrl) => {
            try {
                const stored = localStorage.getItem('dynamicRooms');
                if (stored && roomId) {
                    const rooms = JSON.parse(stored);
                    const updated = rooms.filter(r => String(r.id) !== String(roomId));
                    localStorage.setItem('dynamicRooms', JSON.stringify(updated));
                }
            } catch (e) { console.error('방 삭제 실패:', e); }
            try {
                const sessionKey = sessionId;
                [
                    'battleProblems',
                    'battleSettings',
                    'battleSubmission',
                    'battleProblemData',
                    'battleProblemTitle',
                    'myBattleCode',
                    'opponentBattleCode',
                    'roomUsers',
                    'battleSubmittedProblems_' + sessionKey,
                    'battleDraft_' + sessionKey,
                    'battleDraftCode_' + sessionKey,
                    'battleDraftMeta_' + sessionKey,
                    'room_kicked_' + roomId
                ].forEach((key) => localStorage.removeItem(key));
                fetch(`/api/v1/build/session/${encodeURIComponent(sessionKey)}`, { method: 'DELETE' }).catch(() => {});
            } catch (e) { console.error('세션 삭제 실패:', e); }
            window.location.href = targetUrl;
        };

        const statusClass = status === 'running' ? 'terminal-running' : status === 'error' ? 'terminal-error' : status === 'success' ? 'terminal-success' : '';

        // Chat state
        const [chatMessages, setChatMessages] = useState([
            { sender: 'SYSTEM', text: '배틀 시작! 서로 화이팅 하세요.', mode: '', time: '' }
        ]);
                        const [chatMsg, setChatMsg] = useState('');
        const [chatMode, setChatMode] = useState('ALL');
        const [chatExpanded, setChatExpanded] = useState(false);
        const chatRef = useRef(null);
        const chatMessagesRef = useRef(null);

        const handleSendChat = () => {
            if (!demoSpectating) return;
            if (!chatMsg.trim()) return;
            const now = new Date();
            const timeStr = `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
            const modeLabel = chatMode === 'ALL' ? '[전체]' : '[친구]';
            setChatMessages(prev => [...prev, { sender: 'rocky_user', text: chatMsg, mode: modeLabel, time: timeStr }]);
            setChatMsg('');
        };

        useEffect(() => {
            const handlePointerDown = (e) => {
                if (!chatExpanded) return;
                if (chatRef.current && !chatRef.current.contains(e.target)) {
                    setChatExpanded(false);
                }
            };

            document.addEventListener('mousedown', handlePointerDown);
            document.addEventListener('touchstart', handlePointerDown);
            return () => {
                document.removeEventListener('mousedown', handlePointerDown);
                document.removeEventListener('touchstart', handlePointerDown);
            };
        }, [chatExpanded]);

        useEffect(() => {
            const handleKeyDown = (e) => {
                if (e.key !== 'Enter') return;
                const active = document.activeElement;
                if (active && (
                    active.tagName === 'INPUT' ||
                    active.tagName === 'TEXTAREA' ||
                    active.tagName === 'SELECT' ||
                    active.tagName === 'BUTTON'
                )) return;
                if (!submittedProblemIndices.includes(currentIndex)) return;
                if (chatExpanded) return;
                e.preventDefault();
                setChatExpanded(true);
            };
            document.addEventListener('keydown', handleKeyDown);
            return () => document.removeEventListener('keydown', handleKeyDown);
        }, [chatExpanded, currentIndex, submittedProblemIndices]);

        useEffect(() => {
            const el = chatMessagesRef.current;
            if (!el) return;
            el.scrollTop = el.scrollHeight;
        }, [chatMessages]);

        return (
            <div className="page-container">
                <div className="battle-layout">
                    <div className="battle-workspace">
                        <div className="battle-main-column">
                            <div className="pixel-card code-card" style={{position:'relative'}}>
                                <div className="pixel-card-header"><div className="code-card-title-group"><span style={{color:'var(--px-primary)'}}>MY CODE</span><span className="code-card-lang-badge">{langLabel}</span></div><div className="code-card-header-gauge"><div className="progress-track"><div className="progress-fill" style={{width: `${progressPercent}%`}}></div></div><span>{problemProgressText}</span></div><button className="panel-toggle-btn" onClick={() => setProblemCollapsed(!problemCollapsed)} title={problemCollapsed ? '문제 펼치기' : '문제 접기'}>{problemCollapsed ? '▼' : '▲'}</button></div>
                                <div key="problem-summary" className="code-problem-summary" style={{height: problemCollapsed ? 55 : 210}}>
                                    <div className="code-problem-head">
                                        <div className="code-problem-copy">
                                            <div className="code-problem-kicker">PROBLEM</div>
                                            <div className="code-problem-title">{currentProblem.title || 'Loading...'}</div>
                                        </div>
                                    </div>
                                    <div className="code-problem-body">
                                        <div>{currentProblem.explanation || '문제가 아직 로드되지 않았습니다.'}</div>
                                        <div className="example-box">
                                            <div className="label">PREVIEW</div>
                                            <div style={{fontFamily:'var(--font-pixel)', fontSize:'14px', color:'#ccc'}}>{currentProblem.partialCode?.easy || ''}</div>
                                        </div>
                                        <div className="example-box">
                                            <div className="label">ANSWER</div>
                                            <div>{(() => { const a = currentProblem.answer?.[difficulty]?.[langKey]; return Array.isArray(a) ? a.join(', ') : (a || '없음'); })()}</div>
                                        </div>
                                    </div>
                                </div>
                                <div className="fill-blank-area">
                                    <div className="fill-blank-code">
                                        {renderPartialCode((typeof currentProblem?.partialCode === 'string' ? currentProblem.partialCode : currentProblem?.partialCode?.[difficulty]) || '', blankAnswers[currentIndex], currentIndex)}
                                    </div>
                                    {checkResults[currentIndex] && (
                                        <div style={{color: checkResults[currentIndex].correct ? 'var(--px-success)' : 'var(--px-danger)', fontSize: '14px', padding: '4px 8px'}}>
                                            {checkResults[currentIndex].message}
                                        </div>
                                    )}
                                </div>
                                <div className="terminal-panel" style={{height: outputCollapsed ? 36 : 140}}>
                                    <div className="terminal-header">
                                        <span>OUTPUT</span>
                                        <span>STATUS: <span className={statusClass}>{status.toUpperCase()}</span> <button className="panel-toggle-btn" onClick={() => setOutputCollapsed(!outputCollapsed)} title={outputCollapsed ? '출력창 펼치기' : '출력창 접기'} style={{marginLeft:'8px'}}>{outputCollapsed ? '▲' : '▼'}</button></span>
                                    </div>
                                    <div className="terminal-content">{output}</div>
                                </div>
                                <div className="panel-actions">
                                    <button className={`pixel-btn ${demoSpectating || spectatorLocked ? 'pixel-btn-secondary' : 'pixel-btn-primary'}`} onClick={handleBuild} style={{padding:'4px 10px', fontSize:'16px', opacity: demoSpectating || spectatorLocked ? '0.5' : '1'}}>{demoSpectating || spectatorLocked ? 'LOCKED' : 'RUN / BUILD'}</button>
                                    <button className="pixel-btn pixel-btn-success" onClick={handleCheck} style={{padding:'4px 10px', fontSize:'16px'}}>채점</button>
                                </div>
                                {submittedProblemIndices.includes(currentIndex) && (
                                    <div className={`chat-overlay ${chatExpanded ? 'visible' : ''}`}>
                                        <div className="chat-slot">
                                            <div ref={chatRef} className={`chat-wrapper ${chatExpanded ? 'chat-expanded' : ''}`}>
                                                <div className="chat-messages" ref={chatMessagesRef}>
                                                    {chatMessages.map((msg, i) => (
                                                        <div key={i} style={{marginBottom:'2px'}}>
                                                            {msg.sender === 'SYSTEM' ? (
                                                                <span style={{color:'var(--px-warning)'}}>{msg.text}</span>
                                                            ) : (
                                                                <span><span style={{color:'var(--px-warning)', fontSize:'14px'}}>{msg.mode}</span> <span style={{color:'var(--px-primary)'}}>{msg.sender}</span> <span style={{color:'#ccc'}}>{msg.text}</span></span>
                                                            )}
                                                        </div>
                                                    ))}
                                                </div>
                                                <div className="chat-input-row">
                                                    <select className="chat-mode-select" value={chatMode} onChange={e => setChatMode(e.target.value)}>
                                                        <option value="ALL">모두에게</option>
                                                        <option value="FRIEND">친구에게</option>
                                                    </select>
                                                    <input type="text" className="chat-input" placeholder={demoSpectating ? "메시지..." : "관전 모드에서만 채팅 가능"} value={chatMsg} onFocus={() => { if (!demoSpectating) return; setChatExpanded(true); }} onChange={e => setChatMsg(e.target.value)} onKeyDown={e => e.key === 'Enter' && handleSendChat()} disabled={!demoSpectating} style={!demoSpectating ? {opacity:'0.4', cursor:'not-allowed'} : {}} />
                                                    <button className="chat-send-btn" onClick={handleSendChat} disabled={!demoSpectating} style={!demoSpectating ? {opacity:'0.4', cursor:'not-allowed'} : {}}>전송</button>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                )}
                            </div>
                        </div>

                        <div className="battle-opponent-column">
                            <div className="opponent-timer-strip" style={{height: 119}}>
                                <div>
                                    <div className="opponent-timer-kicker">TIME LEFT</div>
                                    <div className="opponent-timer-detail">현재 라운드 제한 시간</div>
                                </div>
                                <div className="opponent-timer-clock" style={{fontSize: 22}}>{formatTime(remaining)}</div>
                            </div>
                            <div className={`opponent-panels-container ${!expandedOpponentId && battleBots.length >= 5 ? 'two-cols' : ''} count-${battleBots.length} ${expandedOpponentId ? 'expanded-mode' : ''}`}>
                                {expandedOpponentId ? (
                                    (() => {
                                        const bot = currentBotViews.find(b => b.id === expandedOpponentId);
                                        if (!bot) return null;
                                        const panelEff = opponentEffects[bot.id]?.[currentIndex]?.panelEffect;
                                        const hasActivePaint = panelEff?.type === 'paint' && Date.now() < panelEff.expiresAt;
                                        const isRevealed = demoSpectating || currentProblemLocked || (attackState.active && attackState.targetBotId === bot.id) || hasActivePaint;
                                        const partialCode = (typeof currentProblem?.partialCode === 'string' ? currentProblem.partialCode : currentProblem?.partialCode?.[difficulty]) || '';
                                        const codeLines = partialCode.split('\n');
                                        const edAnswers = isRevealed ? bot.currentBlankAnswers : [];
                                        const edNow = Date.now();
                                        const lineEffs = opponentEffects[bot.id]?.[currentIndex]?.lineEffects || {};
                                        const blankEffs = opponentEffects[bot.id]?.[currentIndex]?.blankEffects || {};
                                        const isTargetable = attackState.active && attackState.phase === 'target-line';
                                        let gIdx = 0;
                                        return (
                                            <div className={`opponent-code-panel-mini expanded ${isRevealed ? 'revealed' : 'hidden'}`} key={bot.id}>
                                                <div className="mini-header">
                                                    <span>
                                                        {demoIsVersusMany && (
                                                            <button className="mini-back-btn" onClick={(e) => { e.stopPropagation(); setExpandedOpponentId(null); }}>◀ BACK</button>
                                                        )}
                                                        {bot.avatar} {bot.name}
                                                    </span>
                                                    <span>
                                                        {bot.status === 'solved' ? '✓' : '...'}
                                                        {(() => {
                                                            const now = Date.now();
                                                            const panelEff = opponentEffects[bot.id]?.[currentIndex]?.panelEffect;
                                                            const hasPaint = panelEff?.type === 'paint' && now < panelEff.expiresAt;
                                                            const hasBuildLimit = !!buildLimits[bot.id]?.[currentIndex];
                                                            const lEffs = opponentEffects[bot.id]?.[currentIndex]?.lineEffects || {};
                                                            const hasGrenade = Object.values(lEffs).some(e => e.type === 'grenade' && now < e.expiresAt);
                                                            const bEffs = opponentEffects[bot.id]?.[currentIndex]?.blankEffects || {};
                                                            const hasSymbol = Object.values(bEffs).some(e => e.type === 'symbol' && now < e.expiresAt);
                                                            let icons = '';
                                                            if (hasGrenade) icons += '💣';
                                                            if (hasSymbol) icons += '🔣';
                                                            if (hasPaint) icons += '🎨';
                                                            if (hasBuildLimit) icons += '🚫';
                                                            return icons;
                                                        })()}
                                                        <button className="item-btn" onClick={(e) => { e.stopPropagation(); handleOpenItemModal(); }} disabled={Object.values(itemInventory).every(v => v <= 0) || bot.currentProblemSolved} title="아이템 사용">⚡ ITEM</button>
                                                    </span>
                                                </div>
                                                {renderMiniStatus(bot)}
                                                <div className="mini-code-area" style={{position:'relative'}}>
                                                    {attackState.active && attackState.targetBotId === bot.id && attackState.revealTimer > 0 && (
                                                        <div style={{position:'absolute', top:'4px', right:'6px', background:'rgba(0,0,0,0.7)', color:'var(--px-warning)', fontSize:'14px', padding:'2px 8px', border:'2px solid var(--px-border)', zIndex:10}}>
                                                            {attackState.revealTimer}s
                                                        </div>
                                                    )}
                                                    <div className="mini-code-lines" style={{width:'100%', height:'100%', overflow:'auto', background:'#1a1e21', padding:'4px 6px', fontFamily:'var(--font-pixel)', fontSize:'12px', lineHeight:'1.5', color:'var(--px-text)', position:'relative', pointerEvents: isTargetable ? 'auto' : undefined}}>
                                                        <PaintCanvasOverlay effect={opponentEffects[bot.id]?.[currentIndex]?.panelEffect} />
                                                        <div style={{whiteSpace:'pre-wrap'}}>
                                                            {codeLines.map((line, lineIdx) => {
                                                                const grenadeEff = lineEffs[lineIdx];
                                                                const isLineDeleted = grenadeEff?.type === 'grenade' && edNow < grenadeEff.expiresAt;
                                                                if (isLineDeleted) {
                                                                    gIdx += (line.match(/[a-zA-Z0-9_]*_____/g) || []).length;
                                                                    return (
                                                                        <div key={lineIdx} style={{minHeight:'1.5em', padding:'1px 4px', color:'var(--px-danger)', textDecoration:'line-through'}}>
                                                                            💣 삭제됨
                                                                        </div>
                                                                    );
                                                                }
                                                                const parts = line.split('_____');
                                                                const lineResult = (
                                                                    <div
                                                                        key={lineIdx}
                                                                        className={isTargetable ? 'line-target-hover' : ''}
                                                                        style={{padding:'1px 4px', cursor: isTargetable ? 'pointer' : 'default', minHeight:'1.5em', whiteSpace:'pre-wrap', position:'relative', zIndex: isTargetable ? 5 : 'auto'}}
                                                                        onClick={() => handleLineClick(lineIdx)}
                                                                    >
                                                                        {parts.map((part, partIdx) => {
                                                                            const blankIdx = gIdx + partIdx;
                                                                            const bear = blankEffs[blankIdx];
                                                                            const isSymbolBear = bear?.type === 'symbol' && edNow < bear.expiresAt;
                                                                            return (
                                                                                <span key={partIdx} style={{whiteSpace:'pre-wrap'}}>
                                                                                    {part}
                                                                                    {partIdx < parts.length - 1 && (
                                                                                        <input
                                                                                            className="blank-input"
                                                                                            value={isSymbolBear ? bear.modifiedValue : (edAnswers[blankIdx] || '')}
                                                                                            readOnly={true}
                                                                                            disabled={true}
                                                                                            style={{width:'80px', display:'inline-block', backgroundColor: isSymbolBear ? 'rgba(247,213,29,0.4)' : '', color: isSymbolBear ? '#f7d51d' : '', pointerEvents:'none'}}
                                                                                        />
                                                                                    )}
                                                                                </span>
                                                                            );
                                                                        })}
                                                                    </div>
                                                                );
                                                                gIdx += parts.length - 1;
                                                                return lineResult;
                                                            })}
                                                        </div>
                                                    </div>
                                                    {!isRevealed && (
                                                        <div className="mini-overlay">
                                                            {bot.avatar} CODE
                                                            <small>제출 후 확인 가능</small>
                                                        </div>
                                                    )}
                                                </div>
                                            </div>
                                        );
                                    })()
                                ) : battleBots.length >= 5 ? (() => {
                                    const mid = Math.ceil(currentBotViews.length / 2);
                                    const leftBots = currentBotViews.slice(0, mid);
                                    const rightBots = currentBotViews.slice(mid);
                                    const renderMini = (bot) => {
                                        const now = Date.now();
                                        const panelEff = opponentEffects[bot.id]?.[currentIndex]?.panelEffect;
                                        const hasPaint = panelEff?.type === 'paint' && now < panelEff.expiresAt;
                                        const lEffs = opponentEffects[bot.id]?.[currentIndex]?.lineEffects || {};
                                        const hasGrenade = Object.values(lEffs).some(e => e.type === 'grenade' && now < e.expiresAt);
                                        const bEffs = opponentEffects[bot.id]?.[currentIndex]?.blankEffects || {};
                                        const hasSymbol = Object.values(bEffs).some(e => e.type === 'symbol' && now < e.expiresAt);
                                        const hasBuild = !!buildLimits[bot.id]?.[currentIndex];
                                        let effIcon = '';
                                        if (hasGrenade) effIcon += '💣';
                                        if (hasSymbol) effIcon += '🔣';
                                        if (hasPaint) effIcon += '🎨';
                                        if (hasBuild) effIcon += '🚫';
                                        return (
                                            <div key={bot.id} className={`opponent-code-panel-mini ${demoSpectating || currentProblemLocked || hasPaint ? 'revealed' : 'hidden'}`} onClick={() => setExpandedOpponentId(bot.id)} style={{cursor:'pointer'}}>
                                                <div className="mini-header">
                                                    <span>{bot.avatar} {bot.name}</span>
                                                    <span>{bot.status === 'solved' ? '✓' : '...'}{effIcon}</span>
                                                </div>
                                                {renderMiniStatus(bot)}
                                                <div className="mini-code-area">
                                                    <div className="mini-code-textarea" style={{whiteSpace: 'pre-wrap', overflow: 'auto'}}>
                                                        {renderPartialCode((typeof currentProblem?.partialCode === 'string' ? currentProblem.partialCode : currentProblem?.partialCode?.[difficulty]) || '', [], -1)}
                                                    </div>
                                                    <PaintCanvasOverlay effect={opponentEffects[bot.id]?.[currentIndex]?.panelEffect} />
                                                    <div className="mini-overlay">
                                                        {bot.avatar} CODE
                                                        <small>클릭하여 확대</small>
                                                    </div>
                                                </div>
                                            </div>
                                        );
                                    };
                                    return (
                                        <>
                                            <div className="opponent-col">{leftBots.map(renderMini)}</div>
                                            <div className="opponent-col">{rightBots.map(renderMini)}</div>
                                        </>
                                    );
                                })() : (
                                    currentBotViews.map((bot) => {
                                        const now = Date.now();
                                        const panelEff = opponentEffects[bot.id]?.[currentIndex]?.panelEffect;
                                        const hasPaint = panelEff?.type === 'paint' && now < panelEff.expiresAt;
                                        const lEffs = opponentEffects[bot.id]?.[currentIndex]?.lineEffects || {};
                                        const hasGrenade = Object.values(lEffs).some(e => e.type === 'grenade' && now < e.expiresAt);
                                        const bEffs = opponentEffects[bot.id]?.[currentIndex]?.blankEffects || {};
                                        const hasSymbol = Object.values(bEffs).some(e => e.type === 'symbol' && now < e.expiresAt);
                                        const hasBuild = !!buildLimits[bot.id]?.[currentIndex];
                                        let effIcon = '';
                                        if (hasGrenade) effIcon += '💣';
                                        if (hasSymbol) effIcon += '🔣';
                                        if (hasPaint) effIcon += '🎨';
                                        if (hasBuild) effIcon += '🚫';
                                        return (
                                            <div key={bot.id} className={`opponent-code-panel-mini ${demoSpectating || currentProblemLocked || hasPaint ? 'revealed' : 'hidden'}`} onClick={() => setExpandedOpponentId(bot.id)} style={{cursor:'pointer'}}>
                                                <div className="mini-header">
                                                    <span>{bot.avatar} {bot.name}</span>
                                                    <span>{bot.status === 'solved' ? '✓' : '...'}{effIcon}</span>
                                                </div>
                                                {renderMiniStatus(bot)}
                                                <div className="mini-code-area">
                                                    <div className="mini-code-textarea" style={{whiteSpace: 'pre-wrap', overflow: 'auto'}}>
                                                        {renderPartialCode((typeof currentProblem?.partialCode === 'string' ? currentProblem.partialCode : currentProblem?.partialCode?.[difficulty]) || '', [], -1)}
                                                    </div>
                                                    <PaintCanvasOverlay effect={opponentEffects[bot.id]?.[currentIndex]?.panelEffect} />
                                                    <div className="mini-overlay">
                                                        {bot.avatar} CODE
                                                        <small>클릭하여 확대</small>
                                                    </div>
                                                </div>
                                            </div>
                                        );
                                    })
                                )}
                            </div>
                            <div style={{display:'flex', gap:'6px', justifyContent:'flex-end', padding:'0 4px 2px', flexShrink:0}}>
                                <button className="pixel-btn pixel-btn-success" onClick={handleSubmit} style={{padding:'4px 10px', fontSize:'14px'}}>제출</button>
                                <button className="pixel-btn pixel-btn-danger" onClick={() => deleteRoomAndNavigate('lobby.html')} style={{padding:'4px 10px', fontSize:'14px'}}>나가기</button>
                            </div>
                        </div>

                </div>

                </div>

                {isProblemSwitchPromptOpen && (
                    <div className="game-over-overlay" style={{zIndex:3000}}>
                        <div className="game-over-box" style={{maxWidth:'520px'}}>
                            <div className="game-over-text" style={{fontSize:'26px'}}>저장할까요?</div>
                            <div className="game-over-sub" style={{marginBottom:'18px'}}>수정한 코드가 있습니다. 문제를 이동하기 전에 저장하시겠습니까?</div>
                            <div style={{display:'flex', gap:'10px', justifyContent:'center'}}>
                                <button className="pixel-btn pixel-btn-success" onClick={confirmProblemSwitch}>저장 후 이동</button>
                                <button className="pixel-btn pixel-btn-secondary" onClick={cancelProblemSwitch}>취소</button>
                            </div>
                        </div>
                    </div>
                )}

                {showSaveModal && (
                    <div className="game-over-overlay" style={{zIndex:3100}}>
                        <div className="game-over-box" style={{maxWidth:'520px', borderColor:'var(--px-warning)'}}>
                            <div className="game-over-text" style={{fontSize:'26px', color:'var(--px-warning)'}}>저장할까요?</div>
                            <div className="game-over-sub" style={{marginBottom:'18px'}}>코드를 저장하고 관전모드로 전환합니다.</div>
                            <div style={{display:'flex', gap:'10px', justifyContent:'center'}}>
                                <button className="pixel-btn pixel-btn-success" onClick={finalizeSaveAndSpectate}>저장 후 관전</button>
                                <button className="pixel-btn pixel-btn-secondary" onClick={cancelSaveAndSpectate}>취소</button>
                            </div>
                        </div>
                    </div>
                )}

                {showClearFlash && (
                    <div className="game-over-overlay clear-overlay">
                        <div className="game-over-box">
                            <div className="game-over-text">CLEAR</div>
                            <div className="game-over-sub">관전모드에 진입했습니다</div>
                        </div>
                    </div>
                )}

                {showAdvanceModal && !showGameOver && (
                    <div className="game-over-overlay" style={{zIndex:3050}}>
                        <div className="game-over-box" style={{maxWidth:'520px', borderColor:'var(--px-primary)'}}>
                            <div className="game-over-text" style={{fontSize:'26px', color:'var(--px-primary)'}}>다음 문제로 넘어갑니다</div>
                            <div className="game-over-sub" style={{marginBottom:'18px'}}>{advanceReason === 'clear' ? '문제를 클리어했습니다!' : advanceReason === 'time' ? '시간이 종료되었습니다.' : '모두 클리어했습니다!'}</div>
                        </div>
                    </div>
                )}

                {showGameOver && (
                    <div className="game-over-overlay">
                        <div className="game-over-box">
                            <div className="game-over-text">GAME OVER</div>
                            <div className="game-over-sub">잠시 후 결과 페이지로 이동합니다...</div>
                        </div>
                    </div>
                )}

                {showItemModal && (
                    <div className="item-modal-overlay" onClick={handleCloseItemModal}>
                        <div className="item-modal-box" onClick={e => e.stopPropagation()}>
                            <div className="item-modal-title">⚡ 아이템 선택</div>
                            <div
                                className="item-option"
                                onClick={() => handleSelectItemType('line')}
                                style={itemInventory.line <= 0 ? {opacity:0.4, cursor:'not-allowed'} : {}}
                            >
                                <div className="item-icon">💣</div>
                                <div className="item-info">
                                    <div className="item-name">라인 아이템</div>
                                    <div className="item-desc">수류탄 (해당 줄 삭제)</div>
                                </div>
                                <div className="item-count-badge">{itemInventory.line}회</div>
                            </div>
                            <div
                                className="item-option"
                                onClick={() => handleSelectItemType('paint')}
                                style={itemInventory.paint <= 0 ? {opacity:0.4, cursor:'not-allowed'} : {}}
                            >
                                <div className="item-icon">🎨</div>
                                <div className="item-info">
                                    <div className="item-name">페인트 아이템</div>
                                    <div className="item-desc">랜덤 페인트 스플래시</div>
                                </div>
                                <div className="item-count-badge">{itemInventory.paint}회</div>
                            </div>
                            <div
                                className="item-option"
                                onClick={() => handleSelectItemType('symbol')}
                                style={itemInventory.symbol <= 0 ? {opacity:0.4, cursor:'not-allowed'} : {}}
                            >
                                <div className="item-icon">🔣</div>
                                <div className="item-info">
                                    <div className="item-name">특수기호 아이템</div>
                                    <div className="item-desc">특수기호 추가/삭제</div>
                                </div>
                                <div className="item-count-badge">{itemInventory.symbol}회</div>
                            </div>
                            <div
                                className="item-option"
                                onClick={() => handleSelectItemType('buildLimit')}
                                style={itemInventory.buildLimit <= 0 ? {opacity:0.4, cursor:'not-allowed'} : {}}
                            >
                                <div className="item-icon">🚫</div>
                                <div className="item-info">
                                    <div className="item-name">빌드제한 아이템</div>
                                    <div className="item-desc">상대 빌드 5회 제한</div>
                                </div>
                                <div className="item-count-badge">{itemInventory.buildLimit}회</div>
                            </div>
                            <div className="item-modal-close">
                                <button className="pixel-btn pixel-btn-secondary" onClick={handleCloseItemModal}>닫기</button>
                            </div>
                        </div>
                    </div>
                )}

                {showSubItemModal && attackState.itemType === 'symbol' && (
                    <div className="item-modal-overlay" onClick={() => setShowSubItemModal(false)}>
                        <div className="item-modal-box" onClick={e => e.stopPropagation()}>
                            <div className="item-modal-title">🔣 특수기호 적용</div>
                            <div style={{display:'flex', gap:'8px', justifyContent:'center', marginBottom:'10px'}}>
                                <button className={`pixel-btn ${symbolAction === 'add' ? 'pixel-btn-success' : 'pixel-btn-secondary'}`} onClick={() => setSymbolAction('add')} style={{fontSize:'14px', padding:'4px 10px'}}>추가</button>
                                <button className={`pixel-btn ${symbolAction === 'delete' ? 'pixel-btn-danger' : 'pixel-btn-secondary'}`} onClick={() => setSymbolAction('delete')} style={{fontSize:'14px', padding:'4px 10px'}}>삭제</button>
                            </div>
                            <div className="symbol-grid">
                                {['{', '}', '(', ')', '[', ']', ';', ':', '@', '#', '$', '%', '^', '&', '*', '+', '=', '/', '\\', '|', '<', '>', ',', '.', '!', '?', '~', '`'].map((sym) => (
                                    <button
                                        key={sym}
                                        className={`symbol-btn ${selectedSymbol === sym ? 'selected' : ''}`}
                                        onClick={() => setSelectedSymbol(sym)}
                                    >{sym}</button>
                                ))}
                            </div>
                            <div className="item-modal-close">
                                <button className="pixel-btn pixel-btn-success" onClick={() => handleSelectSubItem('apply')} disabled={!selectedSymbol}>적용</button>
                                <button className="pixel-btn pixel-btn-secondary" onClick={() => setShowSubItemModal(false)} style={{marginLeft:'8px'}}>취소</button>
                            </div>
                        </div>
                    </div>
                )}
            </div>
        );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<DuelApp />);
</script>
</body>
</html>
