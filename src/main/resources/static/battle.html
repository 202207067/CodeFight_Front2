<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rocky CODING BATTLE</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/galmuri@latest/dist/galmuri.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        :root {
            --px-bg: #212529;
            --px-surface: #2C3E50;
            --px-surface-light: #34495E;
            --px-border: #000000;
            --px-text: #F7F7F7;
            --px-text-muted: #B2BEC3;
            --px-primary: #209CEE;
            --px-success: #92CC41;
            --px-warning: #F7D51D;
            --px-danger: #E76E55;
            --px-shadow-hard: 4px 4px 0px #000;
            --px-inset-light: inset -3px -3px 0px rgba(0,0,0,0.4);
            --px-inset-pressed: inset 3px 3px 0px rgba(0,0,0,0.4);
            --font-pixel: 'NeoDunggeunmo', 'Galmuri9', 'Press Start 2P', monospace;
        }

        * { box-sizing: border-box; image-rendering: pixelated; border-radius: 0 !important; }
        ::selection { background: var(--px-primary); color: var(--px-text); }
        html, body { margin:0; padding:0; background: var(--px-bg); font-family: var(--font-pixel); color: var(--px-text); line-height:1.4; height:100vh; overflow:hidden; font-size: 20px; }
        body { background-image: linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px); background-size: 16px 16px; }
        body::after { content:""; position:fixed; inset:0; background: repeating-linear-gradient(0deg, rgba(0,0,0,0.08) 0px, rgba(0,0,0,0.08) 1px, transparent 1px, transparent 2px); pointer-events:none; z-index:9999; }

        .page-container { display:flex; flex-direction:column; height:100vh; padding:20px 24px 24px; gap:12px; position:relative; z-index:10; }

        .pixel-card { background: var(--px-surface); border:4px solid var(--px-border); box-shadow: var(--px-shadow-hard); display:flex; flex-direction:column; }
        .pixel-card-header { background: var(--px-surface-light); border:4px solid var(--px-border); border-bottom:none; padding:6px 12px; font-size:20px; display:flex; align-items:center; justify-content:space-between; }

        .pixel-btn { display:inline-flex; align-items:center; justify-content:center; font-family:var(--font-pixel); font-size:18px; color:#fff; border:4px solid var(--px-border); outline:none; cursor:pointer; padding:6px 12px; position:relative; user-select:none; box-shadow: var(--px-shadow-hard); transition: transform 0.06s, box-shadow 0.06s; }
        .pixel-btn:active { transform: translate(4px, 4px); box-shadow: 0px 0px 0px #000; }
        .pixel-btn-primary { background: var(--px-primary); text-shadow: 2px 2px 0 rgba(0,0,0,0.4); }
        .pixel-btn-primary:hover { background: #4DAEF4; }
        .pixel-btn-success { background: var(--px-success); color: #000; text-shadow: none; }
        .pixel-btn-success:hover { background: #B0E05D; }
        .pixel-btn-danger { background: var(--px-danger); }
        .pixel-btn-danger:hover { background: #EE8C78; }
        .pixel-btn-secondary { background: #636e72; text-shadow: 2px 2px 0 rgba(0,0,0,0.3); }
        .pixel-btn-secondary:hover { background: #7f8c8d; }

        .pixel-text-primary { color: var(--px-primary); text-shadow: 3px 3px 0 #000, -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000; }
        .pixel-text-success { color: var(--px-success); text-shadow: 2px 2px 0 #000; }
        .pixel-text-warning { color: var(--px-warning); text-shadow: 2px 2px 0 #000; }
        .pixel-text-danger { color: var(--px-danger); text-shadow: 2px 2px 0 #000; }

        .pixel-textarea { flex-grow:1; background: transparent; color: var(--px-text); border: none; padding: 10px; font-family: var(--font-pixel); font-size: 18px; line-height: 1.5; resize: none; outline: none; text-shadow: none; width:100%; height:100%; }
        .pixel-textarea::placeholder { color: #636e72; }

        .terminal-panel { background: #1a1e21; border-top:4px solid var(--px-border); display:flex; flex-direction:column; flex-shrink:0; overflow:hidden; min-height:36px; transition: height 0.2s ease; }
        .terminal-header { padding:4px 10px; font-size:16px; color: var(--px-success); background: #222; border-bottom:2px dashed #444; display:flex; justify-content:space-between; }
        .terminal-content { padding:6px 10px; font-size:18px; font-family:var(--font-pixel); color:#ddd; overflow-y:auto; flex-grow:1; white-space:pre-wrap; line-height:1.5; }
        .terminal-error { color: var(--px-danger); }
        .terminal-success { color: var(--px-success); }
        .terminal-running { color: var(--px-warning); }

        .battle-header { padding:6px 10px; }
        .header-top { display:flex; justify-content:space-between; align-items:center; width:100%; }
        .header-title h4 { margin:0 0 4px 0; font-weight:normal; font-size:20px; color: var(--px-success); text-shadow:2px 2px 0 #000; line-height:1.4; }
        .header-title span { font-size:16px; color:#999; line-height:1.4; }
        .timer-badge { color: var(--px-danger); font-size:22px; text-align:right; text-shadow:2px 2px 0 #000; }

        .battle-layout { display:flex; flex-direction:column; gap:8px; flex-grow:1; min-height:0; min-width:0; }
        .battle-workspace { display:grid; grid-template-columns: minmax(0, 1.7fr) minmax(0, 1fr); gap:8px; min-height:0; flex:1 1 auto; align-items:stretch; }
        .battle-main-column { display:flex; flex-direction:column; gap:8px; min-width:0; min-height:0; flex:1 1 auto; }
        .battle-opponent-column { display:flex; flex-direction:column; min-width:0; min-height:0; flex:1 1 auto; gap:8px; }
        .battle-workspace .pixel-card { box-shadow:none; }
        .battle-workspace .pixel-card-header { border-left:none; border-right:none; margin:0 -4px; }
        .battle-score-mini { padding:8px 8px 10px; display:flex; flex-direction:column; gap:6px; overflow:auto; min-height:0; flex-grow:1; }
        .battle-code-row { display:contents; }
        .code-card { min-height:0; display:flex; flex-direction:column; overflow:hidden; position:relative; flex:1 1 auto; height:auto; }
        .code-card .pixel-card-header { border-left:none; border-right:none; margin:0 -4px; min-height:64px; padding-top:8px; padding-bottom:8px; }
        .code-card-title-group { display:flex; align-items:center; gap:8px; min-width:0; }
        .code-card-lang-badge { background:#1a1e21; border:2px solid var(--px-border); padding:2px 8px; font-size:14px; color:var(--px-warning); box-shadow: var(--px-inset-light); white-space:nowrap; }
        .code-card-header-gauge { display:flex; align-items:center; gap:6px; min-width:0; margin-left:auto; margin-right:8px; }
        .code-card-header-gauge .progress-track { flex-shrink:0; width:90px; height:6px; background:#1a1e21; border:2px solid var(--px-border); box-shadow: var(--px-inset-light); }
        .code-card-header-gauge .progress-fill { background: var(--px-success); height:100%; box-shadow: inset -2px -2px 0 rgba(0,0,0,0.2); transition: width 0.3s; }
        .code-card-header-gauge span { font-size:12px; color:#bbb; white-space:nowrap; }
        .code-problem-summary { padding:10px 12px 12px; border-bottom:3px solid var(--px-border); display:flex; flex-direction:column; gap:8px; background: linear-gradient(180deg, rgba(52, 73, 94, 0.92), rgba(44, 62, 80, 0.98)); min-height:0; flex:0 0 auto; overflow:hidden; transition: height 0.2s ease; }
        .code-problem-head { display:grid; grid-template-columns:minmax(0, 1fr) auto; gap:10px; align-items:start; flex-shrink:0; }
        .code-problem-copy { display:flex; flex-direction:column; gap:4px; min-width:0; }
        .code-problem-kicker { color:#8d8d8d; font-size:11px; letter-spacing:1.2px; text-transform:uppercase; }
        .code-problem-title { color:var(--px-warning); font-size:18px; text-shadow:2px 2px 0 #000; line-height:1.3; word-break:keep-all; }
        .code-problem-status { min-width:88px; padding:6px 10px; border:2px solid var(--px-border); background:#1a1e21; font-size:14px; white-space:nowrap; text-align:center; box-shadow: var(--px-inset-light); }
        .code-problem-body { display:flex; flex-direction:column; gap:8px; font-size:16px; line-height:1.5; min-height:0; flex:1 1 auto; overflow:auto; padding-right:2px; }
        .code-problem-body .example-box { margin-top:0; padding:7px; }
        .opponent-code-panel .panel-editor { position:relative; }
        .opponent-code-panel.hidden .pixel-textarea { filter: blur(1.6px) saturate(0.75); user-select:none; pointer-events:none; }
        .opponent-code-panel.revealed .pixel-textarea { filter:none; user-select:text; pointer-events:auto; }
        .opponent-code-overlay { position:absolute; inset:0; background:rgba(0,0,0,0.35); display:flex; align-items:center; justify-content:center; flex-direction:column; color:#fff; text-shadow:2px 2px 0 #000; letter-spacing:2px; font-size:18px; pointer-events:none; }
        .opponent-code-panel.revealed .opponent-code-overlay { display:none; }
        .opponent-code-overlay small { color:#bbb; font-size:12px; letter-spacing:1px; margin-top:6px; }

        .opponent-panels-container { display: flex; flex-direction: column; gap: 4px; min-height: 0; flex: 1; overflow-y: auto; }
        .opponent-panels-container.count-1 .opponent-code-panel-mini { flex: 1; }
        .opponent-panels-container.count-2 .opponent-code-panel-mini { flex: 0 0 calc(50% - 2px); }
        .opponent-panels-container.count-3 .opponent-code-panel-mini { flex: 0 0 calc(33.333% - 3px); }
        .opponent-panels-container.count-4 .opponent-code-panel-mini { flex: 0 0 calc(25% - 3px); }
        .opponent-panels-container.two-cols { display: flex; flex-direction: row; gap: 4px; }
        .opponent-col { flex: 1; display: flex; flex-direction: column; gap: 4px; min-height: 0; }
        .opponent-col .opponent-code-panel-mini { flex: 1; min-height: 0; }
        .opponent-panels-container.expanded-mode { display: flex; flex-direction: column; gap: 0; }
        .opponent-panels-container.expanded-mode .opponent-code-panel-mini { flex: 1; }
        .opponent-code-panel-mini { min-height: 0; display: flex; flex-direction: column; overflow: hidden; position: relative; background: var(--px-surface); border: 4px solid var(--px-border); box-shadow: none; cursor: pointer; transition: border-color 0.1s; }
        .opponent-code-panel-mini:hover { border-color: var(--px-warning); }
        .opponent-code-panel-mini.hidden .mini-code-textarea,
        .opponent-code-panel-mini.hidden .mini-code-lines { filter: blur(6px) saturate(0.3); user-select: none; pointer-events: none; }
        .opponent-code-panel-mini.revealed .mini-code-textarea,
        .opponent-code-panel-mini.revealed .mini-code-lines { filter: none; user-select: text; pointer-events: auto; }
        .opponent-code-panel-mini.expanded { flex: 1; min-height: 0; cursor: default; }
        .opponent-code-panel-mini.expanded:hover { border-color: var(--px-border); }
        .opponent-code-panel-mini.expanded .mini-header { padding: 6px 12px; font-size: 16px; }
        .opponent-code-panel-mini.expanded .mini-code-textarea { font-size: 18px; padding: 10px; }
        .mini-header { padding: 3px 6px; font-size: 13px; display: flex; justify-content: space-between; align-items: center; background: var(--px-surface-light); border-bottom: 3px solid var(--px-border); flex-shrink: 0; }
        .mini-back-btn { background: none; border: none; color: var(--px-warning); font-family: var(--font-pixel); font-size: 14px; cursor: pointer; padding: 2px 6px; margin-right: 8px; }
        .mini-back-btn:hover { color: #fff; }
        .mini-code-area { flex: 1; min-height: 0; background: #1a1e21; position: relative; box-shadow: var(--px-inset-light); }
        .mini-code-textarea { width: 100%; height: 100%; background: transparent; color: var(--px-text); border: none; padding: 4px 6px; font-family: var(--font-pixel); font-size: 12px; line-height: 1.3; resize: none; outline: none; text-shadow: none; }
        .mini-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.35); display: flex; align-items: center; justify-content: center; flex-direction: column; color: #fff; text-shadow: 2px 2px 0 #000; font-size: 13px; letter-spacing: 1px; pointer-events: none; }
        .mini-overlay small { color: #bbb; font-size: 11px; margin-top: 4px; }
        .opponent-code-panel-mini.revealed .mini-overlay { display: none; }

        .item-btn { background: none; border: 3px solid var(--px-warning); color: var(--px-warning); font-family: var(--font-pixel); font-size: 13px; cursor: pointer; padding: 2px 8px; margin-left: 8px; box-shadow: var(--px-shadow-hard); transition: transform 0.06s; }
        .item-btn:hover { background: var(--px-warning); color: #000; }
        .item-btn:active { transform: translate(2px, 2px); box-shadow: 0px 0px 0px #000; }
        .item-btn:disabled { border-color: #555; color: #555; cursor: not-allowed; box-shadow: none; }
        .item-btn:disabled:hover { background: none; color: #555; }

        .item-modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.85); z-index:3500; display:flex; align-items:center; justify-content:center; }
        .item-modal-box { background: var(--px-surface); border:4px solid var(--px-border); box-shadow: var(--px-shadow-hard); padding:16px; max-width:420px; width:92%; }
        .item-modal-title { font-size:22px; color:var(--px-warning); text-shadow:2px 2px 0 #000; margin-bottom:12px; text-align:center; }
        .item-option { background: #1a1e21; border:3px solid var(--px-border); padding:10px; margin-bottom:8px; cursor:pointer; display:flex; align-items:center; gap:10px; transition:0.1s; }
        .item-option:hover { border-color: var(--px-warning); background: #252f3f; }
        .item-option:disabled { opacity:0.4; cursor:not-allowed; border-color:#333; }
        .item-option:disabled:hover { border-color:#333; background:#1a1e21; }
        .item-icon { font-size:24px; width:36px; text-align:center; }
        .item-info { flex:1; }
        .item-name { font-size:16px; color:#fff; }
        .item-desc { font-size:12px; color:#aaa; }
        .item-count-badge { background: var(--px-surface-light); border:2px solid var(--px-border); padding:2px 6px; font-size:13px; color:var(--px-success); }
        .item-modal-close { text-align:center; margin-top:10px; }

        .sub-item-grid { display:grid; grid-template-columns: repeat(3, 1fr); gap:8px; margin-top:10px; }
        .sub-item-btn { background: #1a1e21; border:3px solid var(--px-border); padding:10px 4px; cursor:pointer; text-align:center; transition:0.1s; }
        .sub-item-btn:hover { border-color: var(--px-warning); background: #252f3f; }
        .sub-item-icon { font-size:28px; display:block; margin-bottom:4px; }
        .sub-item-label { font-size:13px; color:#ddd; }

        .symbol-grid { display:flex; flex-wrap:wrap; gap:4px; margin:8px 0; justify-content:center; }
        .symbol-btn { background: #1a1e21; border:2px solid var(--px-border); color: var(--px-text); font-family: var(--font-pixel); font-size:18px; width:36px; height:36px; display:flex; align-items:center; justify-content:center; cursor:pointer; }
        .symbol-btn:hover { border-color: var(--px-warning); }
        .symbol-btn.selected { border-color: var(--px-success); background: rgba(146,204,65,0.15); }

        .line-deleted { color: var(--px-danger) !important; opacity: 0.4; }
        .line-target-hover { background: rgba(247,213,29,0.15) !important; outline: 1px dashed var(--px-warning); }
        @keyframes paintThrowL { 0% { transform: translate(-140%, -100%) rotate(-35deg) scale(0.1); opacity: 0; } 20% { transform: translate(-60%, -35%) rotate(-15deg) scale(0.6); opacity: 1; } 40% { transform: translate(-18%, -5%) rotate(8deg) scale(1.18); } 65% { transform: translate(-2%, 2%) rotate(3deg) scale(0.9); } 100% { transform: translate(0, 0) rotate(0deg) scale(1); opacity: 0.95; } }
        @keyframes paintThrowR { 0% { transform: translate(140%, -90%) rotate(35deg) scale(0.1); opacity: 0; } 20% { transform: translate(55%, -30%) rotate(15deg) scale(0.6); opacity: 1; } 40% { transform: translate(15%, -5%) rotate(-8deg) scale(1.18); } 65% { transform: translate(2%, 2%) rotate(-3deg) scale(0.9); } 100% { transform: translate(0, 0) rotate(0deg) scale(1); opacity: 0.95; } }
        @keyframes paintThrowC { 0% { transform: translate(0, -130%) scale(0.1); opacity: 0; } 20% { transform: translate(0, -40%) scale(0.6); opacity: 1; } 40% { transform: translate(0, -5%) scale(1.2); } 65% { transform: translate(0, 4%) scale(0.9); } 100% { transform: translate(0, 0) scale(1); opacity: 0.95; } }
        @keyframes paintDroplet { 0% { transform: translate(0, 0) scale(0); opacity: 0; } 12% { transform: translate(var(--dx), var(--dy)) scale(1.8); opacity: 1; } 100% { transform: translate(calc(var(--dx) * 3.5), calc(var(--dy) * 3.5)) scale(0.05); opacity: 0; } }
        @keyframes paintDrip { 0% { transform: translateY(-40%) scaleY(0.15); opacity: 0; } 25% { transform: translateY(0) scaleY(1.25); opacity: 0.95; } 70% { transform: translateY(18%) scaleY(1.6); opacity: 0.7; } 100% { transform: translateY(30%) scaleY(2.4); opacity: 0.15; } }
        .panel-paint-overlay { position: absolute; inset: 0; z-index: 15; pointer-events: none; overflow: hidden; }
        .paint-blob { position: absolute; opacity: 0; }
        .paint-blob.large { border-radius: 38% 62% 45% 55% / 56% 32% 68% 44% !important; }
        .paint-blob.medium { border-radius: 50% 50% 42% 58% / 48% 52% 44% 56% !important; }
        .paint-droplet { position: absolute; border-radius: 50%; width: 10px; height: 10px; animation: paintDroplet 1.3s ease-out forwards; }
        .paint-drip { position: absolute; width: 10px; border-radius: 40% 40% 55% 45%; animation: paintDrip 1.8s ease-in forwards; }

        .panel-editor { flex:1; background: #1a1e21; box-shadow: var(--px-inset-light); position:relative; min-height:0; }
        .panel-actions { padding:4px 8px; background: #222; border-top:3px solid var(--px-border); display:flex; justify-content:flex-end; gap:8px; flex-shrink:0; }
        .summary-top { display:grid; grid-template-columns:minmax(0, 1fr) auto; gap:10px; align-items:start; }
        .summary-copy { display:flex; flex-direction:column; gap:4px; min-width:0; }
        .summary-kicker { color:#8d8d8d; font-size:11px; letter-spacing:1.2px; text-transform:uppercase; }
        .summary-title { color:var(--px-warning); font-size:17px; text-shadow:2px 2px 0 #000; line-height:1.3; word-break:keep-all; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
        .summary-clock { min-width:88px; padding:6px 10px; border:2px solid var(--px-border); background:#1a1e21; color:var(--px-danger); font-size:18px; text-shadow:2px 2px 0 #000; white-space:nowrap; text-align:center; box-shadow: var(--px-inset-light); }
        .summary-meta { display:flex; flex-wrap:wrap; gap:6px; }
        .summary-pill { background:#1a1e21; border:2px solid var(--px-border); padding:4px 8px; font-size:12px; color:#ddd; white-space:nowrap; display:inline-flex; align-items:center; gap:4px; }

        .opponent-overlay { position:absolute; inset:0; background:rgba(0,0,0,0.65); display:flex; flex-direction:column; align-items:center; justify-content:center; color:#ddd; z-index:10; text-align:center; }

        .panel-toggle-btn { background: var(--px-surface-light); border:3px solid var(--px-border); color: var(--px-warning); font-family: var(--font-pixel); font-size:16px; cursor:pointer; padding:1px 8px; box-shadow: var(--px-shadow-hard); user-select:none; transition: background 0.1s; }
        .panel-toggle-btn:hover { background: var(--px-primary); color: #fff; }

        .user-list { padding:8px; display:flex; flex-direction:column; gap:6px; overflow-y:auto; flex-grow:1; }
        .user-item { background: #252f3f; border:3px solid var(--px-border); padding:6px; display:flex; align-items:center; gap:6px; box-shadow: var(--px-shadow-hard); }
        .user-item.me { border-color: var(--px-primary); }
        .user-item.clickable { cursor:pointer; transition: transform 0.06s, border-color 0.1s; }
        .user-item.clickable:hover { border-color: var(--px-warning); }
        .user-item.clickable:active { transform: translate(2px, 2px); }
        .user-avatar { font-size:1.6rem; }
        .user-info { flex-grow:1; display:flex; flex-direction:column; gap:2px; font-size:16px; }
        .user-gauge { background: #1a1e21; border: 2px solid var(--px-border); height: 10px; width: 100%; box-shadow: var(--px-inset-light); }
        .user-gauge-fill { background: var(--px-success); height: 100%; box-shadow: inset -1px -1px 0 rgba(0,0,0,0.2); transition: width 0.3s; }
        .user-problem-checks { display:flex; flex-wrap:wrap; gap:4px; margin-top:4px; }
        .problem-check { width:22px; height:22px; border:3px solid var(--px-border); background:#1a1e21; display:inline-flex; align-items:center; justify-content:center; font-size:14px; line-height:1; color:#666; box-shadow: var(--px-inset-light); }
        .problem-check.filled { background: var(--px-success); color:#000; }
        .mini-status-row { padding:4px 6px 6px; display:flex; flex-direction:column; gap:4px; background: rgba(0,0,0,0.14); border-bottom:3px solid var(--px-border); flex-shrink:0; }
        .mini-status-top { display:flex; justify-content:space-between; align-items:center; gap:6px; font-size:11px; color:#bbb; line-height:1; }
        .mini-status-checks { display:flex; flex-wrap:wrap; gap:3px; }
        .mini-problem-check { width:12px; height:12px; border:2px solid var(--px-border); background:#1a1e21; display:inline-flex; align-items:center; justify-content:center; font-size:8px; line-height:1; color:#666; box-shadow: var(--px-inset-light); }
        .mini-problem-check.filled { background: var(--px-success); color:#000; }
        .mini-status-gauge { background:#1a1e21; border:2px solid var(--px-border); height:6px; width:100%; box-shadow: var(--px-inset-light); }
        .mini-status-gauge-fill { background: var(--px-success); height:100%; box-shadow: inset -1px -1px 0 rgba(0,0,0,0.2); transition: width 0.3s; }

        .panel-problem { flex:1; min-height:0; background: var(--px-surface); overflow-y:auto; padding:10px; font-size:18px; color:#ddd; line-height:1.6; white-space:pre-wrap; overflow-wrap:break-word; }

        .chat-send-btn { background: var(--px-surface-light); color:#fff; border:none; border-left:4px solid var(--px-border); padding:0 14px; font-family:var(--font-pixel); font-size:18px; cursor:pointer; transition:0.2s; white-space:nowrap; }

        .chat-overlay { position:absolute; bottom:0; left:0; right:0; height:40%; background:rgba(26,30,33,0.75); backdrop-filter:blur(4px); border-top:4px solid var(--px-border); transform:translateY(100%); transition:transform 0.25s ease; z-index:100; display:flex; flex-direction:column; overflow:hidden; }
        .chat-overlay.visible { transform:translateY(0); }
        .chat-overlay .chat-slot { height:100%; flex-shrink:0; position:relative; overflow:visible; }

        .game-over-text { font-size:36px; color: var(--px-danger); text-shadow: 3px 3px 0 #000, -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000; margin-bottom:12px; letter-spacing:4px; }
        .game-over-sub { font-size:18px; color:#999; letter-spacing:2px; }
        .clear-overlay { z-index:2900; background:rgba(0,0,0,0.95); }
        .clear-overlay .game-over-box { border-color: var(--px-success); box-shadow: 0 0 0 4px #000, 0 0 30px rgba(146,204,65,0.45); }
        .clear-overlay .game-over-text { color: var(--px-success); }
        @keyframes gameOverPulse { 0% { box-shadow: 0 0 0 4px #000, 0 0 20px rgba(231,110,85,0.3); } 100% { box-shadow: 0 0 0 4px #000, 0 0 40px rgba(231,110,85,0.7); } }
        .game-over-box { animation: gameOverPulse 1s ease-in-out infinite alternate; }

        ::-webkit-scrollbar { width: 14px; }
        ::-webkit-scrollbar-track { background: var(--px-surface); border-left: 2px solid #000; }
        ::-webkit-scrollbar-thumb { background: var(--px-primary); border: 2px solid #000; }
        ::-webkit-scrollbar-thumb:hover { background: var(--px-warning); }

        @media (max-width: 1280px) {
            .battle-workspace { grid-template-columns: 1fr; }
        }
        @media (max-width: 768px) {

            .page-container { padding:16px 18px 18px; gap:10px; }
            .battle-container { padding:16px 18px; gap:10px; }
            .game-over-box { padding: 24px 32px; }
            .game-over-text { font-size:24px; }
        }

        .fill-blank-area { flex:1; display:flex; flex-direction:column; gap:10px; padding:10px; background:#1a1e21; }
        .fill-blank-code { font-family: var(--font-pixel); font-size: 16px; line-height: 1.8; color: var(--px-text); white-space: pre-wrap; }
        .blank-input { background: #252f3f; border: 2px solid var(--px-border); color: var(--px-primary); font-family: var(--font-pixel); font-size: 16px; padding: 2px 6px; text-align: center; outline: none; box-shadow: var(--px-inset-light); }
        .blank-input:focus { border-color: var(--px-primary); }
        .fill-blank-actions { display: flex; gap: 8px; padding: 8px; border-top: 3px solid var(--px-border); }

</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script type="text/babel">
    const { useEffect, useState, useRef } = React;

    function formatTime(seconds) {
        const mins = String(Math.floor(seconds / 60)).padStart(2, '0');
        const secs = String(seconds % 60).padStart(2, '0');
        return `${mins}:${secs}`;
    }

    const defaultTemplate = {
        JAVA: "public class Main {\n    public static void main(String[] args) {\n        // 내 코드 작성\n    }\n}",
        PYTHON: "def solution():\n    # 내 코드 작성\n    pass\n\nif __name__ == '__main__':\n    solution()",
        CPP: "#include <iostream>\nusing namespace std;\n\nint main() {\n    // 내 코드 작성\n    return 0;\n}"
    };

    const demoBotPool = [
        { name: '알고리즘깎는노인', avatar: '👴', style: 'brute', tag: 'BASE' },
        { name: 'DP마스터', avatar: '🧙', style: 'dp', tag: 'MEMO' },
        { name: '그리디왕', avatar: '🦊', style: 'greedy', tag: 'FAST' },
        { name: '자료구조봇', avatar: '🤖', style: 'hash', tag: 'HASH' },
        { name: '이분탐색요정', avatar: '🧚', style: 'binary', tag: 'BINARY' },
        { name: '큐러버', avatar: '🐼', style: 'queue', tag: 'QUEUE' },
        { name: '백트래커', avatar: '🐉', style: 'backtrack', tag: 'DFS' },
        { name: '시뮬레이터', avatar: '🐱', style: 'simulate', tag: 'SIM' }
    ];

    function hashString(value) {
        let hash = 2166136261;
        const text = String(value || '');
        for (let i = 0; i < text.length; i++) {
            hash ^= text.charCodeAt(i);
            hash = Math.imul(hash, 16777619);
        }
        return hash >>> 0;
    }

    function createSeededRandom(seed) {
        let state = hashString(seed) || 1;
        return () => {
            state ^= state << 13;
            state ^= state >>> 17;
            state ^= state << 5;
            return ((state >>> 0) % 1000000) / 1000000;
        };
    }

    function clamp(value, min, max) {
        return Math.max(min, Math.min(max, value));
    }

    function getLangLabel(langKey) {
        if (langKey === 'PYTHON') return 'python';
        if (langKey === 'CPP' || langKey === 'C++') return 'cpp';
        return 'java';
    }

    function createDemoOpponentRoster(roomMode, maxPlayers, roomId) {
        const parsedMax = Math.max(2, parseInt(maxPlayers, 10) || 2);
        const kicked = (() => { try { return parseInt(localStorage.getItem('room_kicked_' + roomId) || '0', 10); } catch { return 0; } })();
        const botCount = roomMode === '1/1' ? 1 : clamp(parsedMax - 1 - kicked, 1, 7);
        return Array.from({ length: botCount }, (_, index) => {
            const profile = demoBotPool[index % demoBotPool.length];
            const name = index < demoBotPool.length ? profile.name : `${profile.name}${Math.floor(index / demoBotPool.length) + 1}`;
            return {
                id: `bot-${index + 1}`,
                name,
                avatar: profile.avatar,
                style: profile.style,
                tag: profile.tag,
                skill: clamp(0.55 + (botCount - index) * 0.06, 0.55, 0.95),
                score: 1000 - index * 35,
                solvedProblems: [],
                codeByProblem: [],
                status: 'waiting',
                solveAtRemaining: {}
            };
        });
    }

    function buildDemoCode(langKey, problem, bot, problemIndex) {
        const title = problem?.title || `Problem ${problemIndex + 1}`;
        const header = `// ${bot.name} :: ${title}`;
        const hint = `// style: ${bot.style} / ${bot.tag}`;
        if (langKey === 'PYTHON') {
            return `${header}\n${hint}\n\ndef solution(*args):\n    # demo answer\n    values = list(args)\n    return values\n\nif __name__ == '__main__':\n    print(solution())\n`;
        }
        if (langKey === 'CPP' || langKey === 'C++') {
            return `${header}\n${hint}\n#include <bits/stdc++.h>\nusing namespace std;\n\nint main() {\n    ios::sync_with_stdio(false);\n    cin.tie(nullptr);\n    // demo answer\n    return 0;\n}\n`;
        }
        return `${header}\n${hint}\nimport java.util.*;\n\npublic class Main {\n    public static void main(String[] args) throws Exception {\n        // demo answer\n    }\n}\n`;
    }

    function generateBotBlankAnswers(problem, bot, langKey, difficultyKey) {
        const partial = (typeof problem?.partialCode === 'string' ? problem?.partialCode : problem?.partialCode?.[difficultyKey]) || '';
        const blankCount = countBlanks(partial);
        const allCorrect = problem?.answer?.[difficultyKey]?.[langKey] || [];
        const correctAnswers = allCorrect.slice(0, blankCount);
        const skill = bot.skill || 0.6;
        const diff = problem?.difficulty || 'medium';
        const mistakeRate = diff === 'easy' ? 0.1 : diff === 'medium' ? 0.25 : 0.4;
        return correctAnswers.map(ans => {
            if (Math.random() < skill * (1 - mistakeRate)) return ans;
            const wrongOptions = ['???', 'err', 'x', 'null', 'undefined'];
            return wrongOptions[Math.floor(Math.random() * wrongOptions.length)];
        });
    }

    function countBlanks(partialCode) {
        if (!partialCode) return 0;
        const matches = partialCode.match(/[a-zA-Z0-9_]*_____/g);
        return matches ? matches.length : 0;
    }

    function assembleCode(partialCode, blanks) {
        const codeStr = typeof partialCode === 'string' ? partialCode : '';
        if (!codeStr) return '';
        let code = codeStr;
        let blankIdx = 0;
        code = code.replace(/[a-zA-Z0-9_]*_____/g, (match) => {
            const ans = blanks[blankIdx] || '';
            blankIdx++;
            return ans;
        });
        return code;
    }

    function buildDemoRoundPlan({ sessionId, problemIndex, problem, roundSeconds, roster, langKey, roomMode, difficulty }) {
        const rng = createSeededRandom(`${sessionId}:${problemIndex}:${roomMode}:${langKey}`);
        const maxSolveDelay = Math.max(8, Math.min(55, roundSeconds - 5));
        const sortedRoster = [...roster];
        return {
            startedAt: Date.now(),
            problemIndex,
            roundSeconds,
            completed: false,
            bots: sortedRoster.map((bot, index) => {
                const fastBias = roomMode === '1/1' ? 0.55 : 0.45;
                const spread = roomMode === '1/1' ? 0.35 : 0.28;
                const baseDelay = 8 + Math.floor(rng() * 10) + index * 4;
                const slowTail = index === sortedRoster.length - 1 ? 12 : 0;
                const solveDelay = clamp(baseDelay + Math.floor((fastBias + rng() * spread) * 8) + slowTail, 6, maxSolveDelay);
                const solveAtRemaining = Math.max(0, roundSeconds - solveDelay);
                return {
                    id: bot.id,
                    name: bot.name,
                    avatar: bot.avatar,
                    style: bot.style,
                    tag: bot.tag,
                    solveAtRemaining,
                    solved: false,
                    solvedAt: null,
                    code: buildDemoCode(langKey, problem, bot, problemIndex),
                    blankAnswers: generateBotBlankAnswers(problem, bot, langKey, difficulty),
                    scoreBonus: 60 + Math.floor((bot.skill || 0.6) * 100)
                };
            })
        };
    }

    function createDemoBattleRoster({ sessionId, roomMode, maxPlayers, langKey, problems, roundSeconds, difficulty }) {
        const roomId = sessionId ? String(sessionId).replace('battle-', '') : '';
        const baseBots = createDemoOpponentRoster(roomMode, maxPlayers, roomId);
        const plansByProblem = problems.map((problem, problemIndex) => (
            buildDemoRoundPlan({ sessionId, problemIndex, problem, roundSeconds, roster: baseBots, langKey, roomMode, difficulty })
        ));

        return baseBots.map((bot, botIndex) => ({
            ...bot,
            solveScheduleByProblem: plansByProblem.map((plan) => plan.bots[botIndex].solveAtRemaining),
            codeByProblem: plansByProblem.map((plan) => plan.bots[botIndex].code),
            blankAnswersByProblem: plansByProblem.map((plan) => plan.bots[botIndex].blankAnswers),
            scoreBonusByProblem: plansByProblem.map((plan) => plan.bots[botIndex].scoreBonus)
        }));
    }

    function computeDemoScore(baseScore, solvedCount, remaining, roundTime, solvedThisRound) {
        const timeBonus = Math.max(0, Math.floor((remaining / Math.max(1, roundTime)) * 75));
        const clearBonus = solvedThisRound ? 50 : 0;
        return baseScore + solvedCount * 125 + timeBonus + clearBonus;
    }

    function revealDemoCode(code, progress) {
        return String(code || '');
    }

    function DuelApp() {
        const params = new URLSearchParams(window.location.search);
        const freshStart = params.get('fresh') === '1';
        const roomId = params.get('roomId') || '';
        const roomMode = params.get('mode') || '1/1';
        const maxPlayersParam = params.get('maxPlayers') || '2';
        const lang = params.get('lang') || 'JAVA';
        const timeParam = '10';
        const timeMin = 10;
        const timeLabel = timeMin === 60 ? '1시간' : `${timeMin}분`;
        const langKey = lang.toUpperCase();
        const langLabel = langKey === 'PYTHON' ? 'python' : langKey === 'CPP' || langKey === 'C++' ? 'cpp' : 'java';
        const templateCode = defaultTemplate[langKey] || defaultTemplate['JAVA'];
        const CODE_HISTORY_KEY = 'codeHistory_rocky_user';
        const diffParam = params.get('diff') || params.get('difficulty') || '보통';
        const difficultyMap = { '쉬움': 'easy', '보통': 'medium', '어려움': 'hard', 'EASY': 'easy', 'MEDIUM': 'medium', 'HARD': 'hard' };
        const difficulty = difficultyMap[diffParam] || 'medium';

        const [problems, setProblems] = useState([]);
        const [currentIndex, setCurrentIndex] = useState(0);
        const [answers, setAnswers] = useState([]);
        const [remaining, setRemaining] = useState(timeMin * 60);
        const [output, setOutput] = useState("READY...");
        const [status, setStatus] = useState("idle");
        const [showGameOver, setShowGameOver] = useState(false);
        const [showSaveModal, setShowSaveModal] = useState(false);
        const [showClearFlash, setShowClearFlash] = useState(false);
        const [showAdvanceModal, setShowAdvanceModal] = useState(false);
        const [advanceReason, setAdvanceReason] = useState('time');
        const [demoSpectating, setDemoSpectating] = useState(false);
        const [spectatorLocked, setSpectatorLocked] = useState(false);
        const [battleComplete, setBattleComplete] = useState(false);
        const [battleFinished, setBattleFinished] = useState(false);
        const [battleRoundState, setBattleRoundState] = useState(null);
        const [battleBots, setBattleBots] = useState([]);
        const [botRevealTick, setBotRevealTick] = useState(0);
        const [botSolves, setBotSolves] = useState({});
        const [selectedSpectatorBotId, setSelectedSpectatorBotId] = useState('opponent');
        const [expandedOpponentId, setExpandedOpponentId] = useState(null);
        const [sidebarCollapsed, setSidebarCollapsed] = useState(false);
        const [problemCollapsed, setProblemCollapsed] = useState(true);
        const [outputCollapsed, setOutputCollapsed] = useState(true);
        const advanceTimerRef = useRef(null);
        const advanceQueuedRef = useRef(false);
        const saveModalTimerRef = useRef(null);
        const clearFlashTimerRef = useRef(null);
        const [isProblemSwitchPromptOpen, setIsProblemSwitchPromptOpen] = useState(false);
        const [pendingProblemIndex, setPendingProblemIndex] = useState(null);
        const [isEdited, setIsEdited] = useState(false);
        const [sessionSavedSnapshot, setSessionSavedSnapshot] = useState('');
        const [saveStatus, setSaveStatus] = useState('saved');
        const saveDebounceRef = useRef(null);
        const initialSessionLoadedRef = useRef(false);
        const initialSessionSaveQueuedRef = useRef(false);
        const lastTimedPersistRemainingRef = useRef(-1);
        const [submittedProblemIndices, setSubmittedProblemIndices] = useState([]);
        const [localSolvedProblems, setLocalSolvedProblems] = useState([]);
        const [blankAnswers, setBlankAnswers] = useState([]);
        const [checkResults, setCheckResults] = useState({});

        const [itemInventory, setItemInventory] = useState(() => {
            try {
                const stored = localStorage.getItem('rocky_items');
                return stored ? { line: 2, symbol: 2, buildLimit: 2, paint: 2, ...JSON.parse(stored) } : { line: 2, symbol: 2, buildLimit: 2, paint: 2 };
            } catch { return { line: 2, symbol: 2, buildLimit: 2, paint: 2 }; }
        });
        const itemInventoryInitialized = useRef(false);
        const [attackState, setAttackState] = useState({
            active: false,
            phase: null,
            targetBotId: null,
            itemType: null,
            revealTimer: 0,
            selectedLine: null
        });
        const [opponentEffects, setOpponentEffects] = useState({});
        const [buildLimits, setBuildLimits] = useState({});
        const [showItemModal, setShowItemModal] = useState(false);
        const [showSubItemModal, setShowSubItemModal] = useState(false);
        const [subItemType, setSubItemType] = useState(null);
        const [selectedSymbol, setSelectedSymbol] = useState('');
        const [symbolAction, setSymbolAction] = useState('add');
        const revealTimerRef = useRef(null);

        const battleMode = roomMode || '1/1';
        const demoRoundSeconds = timeMin * 60;
        const demoIsVersusMany = battleMode !== '1/1';
        const demoParticipantCount = demoIsVersusMany ? Math.max(2, parseInt(maxPlayersParam, 10) || 2) : 2;

        const saveStatusLabel = saveStatus === 'saving' ? '저장 중' : saveStatus === 'saved' ? '저장됨' : '수정됨';
        const saveStatusClass = saveStatus === 'saved' ? 'pixel-text-success' : saveStatus === 'saving' ? 'pixel-text-warning' : 'pixel-text-danger';

        const hasProblems = problems.length > 0;
        const totalProblems = hasProblems ? problems.length : 1;
        const currentProblemNumber = hasProblems ? currentIndex + 1 : 0;
        const problemProgressText = hasProblems ? `${currentProblemNumber}/${totalProblems}` : '0/1';
        const progressPercent = hasProblems ? (currentProblemNumber / totalProblems) * 100 : 0;
        const opponentSubmittedProblemIndices = [];

        useEffect(() => {
            const fallback = {
                id: 'FB_FALLBACK',
                type: 'fill_blank',
                title: params.get('problem') || '기본 출력',
                partialCode: {
                    easy: 'System._____("Hello, World!");',
                    medium: 'S_____ _____ _____("Hello, World!");',
                    hard: '_____("Hello, World!");'
                },
                answer: { JAVA: 'System.out.println', PYTHON: 'print', CPP: 'cout <<' },
                explanation: '각 언어의 표준 출력 함수/명령입니다.'
            };

            try {
                const stored = localStorage.getItem('battleProblems');
                const parsed = stored ? JSON.parse(stored) : null;
                const baseProblems = Array.isArray(parsed) && parsed.length > 0 ? parsed : [fallback];
                const baseAnswers = Array(baseProblems.length).fill(templateCode);

                if (!freshStart && restoreBattleSession(baseProblems, baseAnswers)) {
                    return;
                }

                setProblems(baseProblems);
                setAnswers(baseAnswers);
                setCurrentIndex(0);
                setRemaining(timeMin * 60);
                setSessionSavedSnapshot(baseAnswers.join('||'));
                setIsEdited(false);
                setSaveStatus('saved');
                initialSessionLoadedRef.current = true;
                initialSessionSaveQueuedRef.current = true;
                lastTimedPersistRemainingRef.current = timeMin * 60;
            } catch (e) {
                console.error('문제 로드 실패:', e);
                setProblems([fallback]);
                setAnswers([templateCode]);
                setCurrentIndex(0);
                setRemaining(timeMin * 60);
                setSessionSavedSnapshot(templateCode);
                setIsEdited(false);
                setSaveStatus('saved');
                initialSessionLoadedRef.current = true;
                initialSessionSaveQueuedRef.current = true;
                lastTimedPersistRemainingRef.current = timeMin * 60;
            }
        }, []);

        useEffect(() => {
            if (problems.length > 0) {
                setBlankAnswers(Array(problems.length).fill(null).map(() => []));
            }
        }, [problems]);

        useEffect(() => {
            if (problems.length === 0) return;
            const nextAnswers = problems.map((p, i) => {
                const partial = (typeof p?.partialCode === 'string' ? p.partialCode : p?.partialCode?.[difficulty]) || '';
                return assembleCode(partial, blankAnswers[i] || []);
            });
            setAnswers(nextAnswers);
        }, [blankAnswers, problems, difficulty]);

        useEffect(() => {
            if (problems.length === 0) return;
            const roster = createDemoBattleRoster({
                sessionId: roomId ? `battle-${roomId}` : 'battle-solo',
                roomMode: battleMode,

            React.useEffect(() => {

                const wrapper = wrapperRef.current;
                if (!wrapper) return;

                const dpr = window.devicePixelRatio || 1;
                const W = wrapper.clientWidth;
                const H = wrapper.clientHeight;

                const canvas = document.createElement('canvas');
                canvas.width = W * dpr;
                canvas.height = H * dpr;
                canvas.style.cssText = 'position:absolute;inset:0;width:100%;height:100%;pointer-events:none;z-index:15';
                wrapper.appendChild(canvas);

                const ctx = canvas.getContext('2d', { willReadFrequently: false });
                ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

                const colors = effect.colors || Array.from({ length: 7 }, () => randomPaintColor());
                const seed = effect.seed || Math.floor(Math.random() * 100000);
                const rng = createSeededRandom(seed);
                const pick = (i) => colors[i % colors.length];
                const PI = Math.PI;
                const cx = W * 0.15;
                const cy = H * 0.17;

                function hashFloat(min, max) {
                    return min + rng() * (max - min);
                }

                function buildBlobPath(x, y, w, h, roughness) {
                    const pts = [];
                    const segs = 16;
                    for (let i = 0; i < segs; i++) {
                        const a = (i / segs) * PI * 2;
                        const r = 0.5 + (rng() - 0.5) * roughness;
                        pts.push({
                            x: Math.cos(a) * w * r,
                            y: Math.sin(a) * h * r * 0.8,
                            cpX: Math.cos(a + (PI / segs)) * w * r * 1.05,
                            cpY: Math.sin(a + (PI / segs)) * h * r * 0.85
                        });
                    }
                    return { x, y, pts };
                }

                const blobs = [];
                blobs.push({
                    ...buildBlobPath(cx, cy, hashFloat(W * 0.14, W * 0.28), hashFloat(H * 0.12, H * 0.24), 0.35),
                    color: pick(0), alpha: 0.94
                });
                for (let i = 0; i < 6; i++) {
                    const angle = hashFloat(-0.3 * PI, 1.0 * PI);
                    const dist = hashFloat(W * 0.06, W * 0.42);
                    blobs.push({
                        ...buildBlobPath(cx + Math.cos(angle) * dist, cy + Math.sin(angle) * dist * 0.7, hashFloat(W * 0.10, W * 0.24), hashFloat(H * 0.09, H * 0.22), hashFloat(0.25, 0.45)),
                        color: pick(i + 1), alpha: hashFloat(0.75, 0.92)
                    });
                }
                for (let i = 0; i < 12; i++) {
                    const angle = hashFloat(-0.1 * PI, 1.2 * PI);
                    const dist = hashFloat(W * 0.10, W * 0.55);
                    blobs.push({
                        ...buildBlobPath(cx + Math.cos(angle) * dist, cy + Math.sin(angle) * dist * 0.7, hashFloat(W * 0.04, W * 0.16), hashFloat(H * 0.04, H * 0.14), hashFloat(0.30, 0.55)),
                        color: pick(i + 2), alpha: hashFloat(0.50, 0.78)
                    });
                }
                for (let i = 0; i < 5; i++) {
                    const angle = hashFloat(0.1 * PI, 1.1 * PI);
                    const dist = hashFloat(W * 0.28, W * 0.58);
                    blobs.push({
                        ...buildBlobPath(cx + Math.cos(angle) * dist, cy + Math.sin(angle) * dist * 0.7, hashFloat(W * 0.14, W * 0.32), hashFloat(H * 0.12, H * 0.26), hashFloat(0.35, 0.50)),
                        color: pick(i + 8), alpha: hashFloat(0.20, 0.40)
                    });
                }

                const streaks = [];
                for (let i = 0; i < 14; i++) {
                    const angle = hashFloat(-0.3 * PI, 1.2 * PI);
                    const len = hashFloat(W * 0.08, W * 0.52);
                    const dist = hashFloat(W * 0.02, W * 0.20);
                    const sx = cx + Math.cos(angle) * dist;
                    const sy = cy + Math.sin(angle) * dist * 0.7;
                    const ex = sx + Math.cos(angle) * len;
                    const ey = sy + Math.sin(angle) * len;
                    const cpx = sx + Math.cos(angle) * len * 0.5 + hashFloat(-len * 0.12, len * 0.12);
                    const cpy = sy + Math.sin(angle) * len * 0.5 + hashFloat(-len * 0.12, len * 0.12);
                    streaks.push({
                        sx, sy, ex, ey, cpx, cpy,
                        width: hashFloat(2, 7),
                        color: pick(i + 3),
                        alpha: hashFloat(0.40, 0.80)
                    });
                }

                const droplets = [];
                for (let i = 0; i < 40; i++) {
                    const angle = hashFloat(-0.2 * PI, 1.3 * PI);
                    const dist = hashFloat(W * 0.02, W * 0.58);
                    const startDist = dist * hashFloat(0.06, 0.22);
                    droplets.push({
                        sx: cx + Math.cos(angle) * startDist,
                        sy: cy + Math.sin(angle) * startDist * 0.7,
                        tx: cx + Math.cos(angle) * dist,
                        ty: cy + Math.sin(angle) * dist * 0.7,
                        rx: hashFloat(3, 11),
                        ry: hashFloat(2, 9),
                        color: pick(i + 4),
                        alpha: hashFloat(0.35, 0.82)
                    });
                }

                const drips = [];
                for (let i = 0; i < 12; i++) {
                    const x = cx + hashFloat(-W * 0.18, W * 0.42);
                    const y = cy + hashFloat(H * 0.01, H * 0.35);
                    const tipOff = hashFloat(-6, 6);
                    drips.push({
                        x, y,
                        len: hashFloat(H * 0.14, H * 0.48),
                        width: hashFloat(2, 7),
                        tipOff,
                        color: pick(i + 5),
                        alpha: hashFloat(0.40, 0.82)
                    });
                }

                function drawBlob(blob, scale, alpha) {
                    ctx.save();
                    ctx.globalAlpha = alpha;
                    ctx.fillStyle = blob.color;
                    ctx.translate(blob.x, blob.y);
                    ctx.scale(scale, scale);
                    ctx.beginPath();
                    const pts = blob.pts;
                    ctx.moveTo(pts[0].x, pts[0].y);
                    for (let i = 0; i < pts.length; i++) {
                        const next = pts[(i + 1) % pts.length];
                        ctx.quadraticCurveTo(pts[i].cpX, pts[i].cpY, next.x, next.y);
                    }
                    ctx.closePath();
                    ctx.fill();
                    ctx.restore();
                }

                ctx.save();
                ctx.fillStyle = 'rgba(0,0,0,0.08)';
                ctx.fillRect(0, 0, W, H);
                ctx.restore();

                ctx.save();
                ctx.filter = 'blur(10px)';
                for (const b of blobs.slice(0, 7)) {
                    drawBlob(b, 1.0, b.alpha);
                }
                ctx.restore();

                for (const b of blobs) {
                    drawBlob(b, 1.0, b.alpha);
                }

                    ctx.save();
                    ctx.globalAlpha = s.alpha;
                    ctx.strokeStyle = s.color;
                    ctx.lineWidth = s.width;
                    ctx.lineCap = 'round';
                    ctx.beginPath();
                    ctx.moveTo(s.sx, s.sy);
                    ctx.quadraticCurveTo(s.cpx, s.cpy, s.ex, s.ey);

                    ctx.restore();
                }

                    ctx.globalAlpha = d.alpha * 0.55;
                    ctx.fillStyle = d.color;

                    ctx.restore();

                    ctx.globalAlpha = d.alpha * 0.65;
                    ctx.fillStyle = d.color;
                    ctx.beginPath();
                    ctx.moveTo(d.x - d.width * 0.5, d.y);
                    const tipX = d.x + d.tipOff;
                    const tipY = d.y + d.len;
                    ctx.quadraticCurveTo(d.x + d.width, d.y + d.len * 0.4, tipX, tipY);

                    ctx.closePath();
                    ctx.fill();
                    ctx.restore();
                }

                ctx.save();
                ctx.globalCompositeOperation = 'screen';
                const grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, W * 0.55);
                grad.addColorStop(0, colors[0] + '44');

                    clearTimeout(expiryTimer);
                    canvas.remove();
                };
            }, [effect]);

            });
        }, function areEqual(prevProps, nextProps) {
            if (!prevProps.effect && !nextProps.effect) return true;
            if (!prevProps.effect || !nextProps.effect) return false;
            return prevProps.effect.type === nextProps.effect.type
